ter;gap:clamp(18px,3.8vw,58px);min-height:76px;border-bottom:1px solid var(--line);overflow-x:auto}nav>button{align-self:stretch;background:none;border:0;border-bottom:3px solid transparent;padding:0 6px;cursor:pointer;font-size:19px;white-space:nowrap}nav>button.active{color:var(--accent);border-bottom-color:var(--accent)}.pager{margin-left:auto;display:flex;align-items:center;gap:10px;font:12px system-ui;color:#777}.pager button{width:52px;height:46px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:24px}.library{border-bottom:1px solid var(--line)}.library summary{padding:28px 0;cursor:pointer;font-size:20px}.library ol{columns:3;color:#555;font-size:14px;line-height:2;padding:0 0 32px}.library li{break-inside:avoid}footer{padding:22px 0 42px;color:#999;font:12px system-ui}

</main><script>
const R=[{"id": 1, "category": "内观", "line": "念头是屏幕上闪过的讯号，你是看见它的人。", "practice": "暂停三次呼吸：此刻是什么念头在自动写剧本？", "source": "终点系统更新到80"}, {"id": 2, "category": "内观", "line": "当你不知道自己相信什么，先看看此刻的情绪。", "practice": "不解释，只给当下的感受命名：紧、急、怕，还是空？", "source": "登出键 简体版"}, {"id": 3, "category": "内观", "line": "你一旦看见自己正在演角色，就已经退回了观众席。", "practice": "问自己：我现在是在观察，还是在表演“必须怎样”？", "source": "终点系统更新到80"}, {"id": 4, "category": "内观", "line": "注意力放在哪里，哪里就会变成你的世界。", "practice": "找出今天被你反复喂养的一个念头。", "source": "中文 Reality Transurfing I–V"}, {"id": 5, "category": "内观", "line": "意识的本质是觉察；你不必跟随每一个反应。", "practice": "在下一次立刻回应前，给自己五秒空白。", "source": "双生紫焰 YT 文字大合集"}, {"id": 6, "category": "内观", "line": "外在情境不是唯一的原因；先回到内在看自己如何理解它。", "practice": "对今天的一件事，分别写下“事实”与“我的解释”。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 7, "category": "金钱", "line": "追逐金钱之前，先看见你真正在追的是安全、自由，还是被认可。", "practice": "写下：“如果钱够了，我终于可以……”", "source": "终点系统更新到80"}, {"id": 8, "category": "金钱", "line": "想要富足，却反复确认自己缺乏，会让注意力一直待在缺乏里。", "practice": "此刻只找三个已经拥有的支持，不必夸大。", "source": "内维尔书籍 中文版合集"}, {"id": 9, "category": "金钱", "line": "钱是一面镜子：它会照出你对价值、配得和流动的信念。", "practice": "花钱或收钱时，观察身体是放松还是收紧。", "source": "莫子综合流动"}, {"id": 10, "category": "金钱", "line": "不要把“必须有用”当成自己值得获得收入的条件。", "practice": "留意今天是否在用忙碌证明自己有价值。", "source": "双生紫焰 YT 文字大合集"}, {"id": 11, "category": "金钱", "line": "尊重金钱，但别把它抬高到能决定你价值的位置。", "practice": "检查一笔消费：它来自选择，还是来自焦虑？", "source": "中文 Reality Transurfing I–V"}, {"id": 12, "category": "金钱", "line": "丰盛不是把所有东西抓紧，而是确信自己能与世界持续交换。", "practice": "今天做一次小而清醒的给予，也允许自己接收。", "source": "25莫子餐叙"}, {"id": 13, "category": "健康", "line": "身体不只是问题的所在，它也一直在告诉你内在正发生什么。", "practice": "不急着修理，先问一个部位：“你想让我注意什么？”", "source": "健康之道（赛斯书）"}, {"id": 14, "category": "健康", "line": "与其反复确认疾病，不如把方向转向“我正越来越健康地活着”。", "practice": "做一件身体会读为“我在照顾你”的小事。", "source": "双生紫焰 YT 文字大合集"}, {"id": 15, "category": "健康", "line": "呼吸不需要做对；它只需要被你重新感觉到。", "practice": "感觉一次吸气的凉和一次呼气的暖。", "source": "终点系统更新到80"}, {"id": 16, "category": "健康", "line": "你对身体持续讲述的故事，会参与身体如何感受自己。", "practice": "今天删掉一次“我的身体就是这样”的断言。", "source": "个人实相（上）"}, {"id": 17, "category": "健康", "line": "身体有自己的节奏；过度的监控有时会比不适更累。", "practice": "选一件身体正在自动做好的事，对它放心一分钟。", "source": "神奇之道—赛斯书"}, {"id": 18, "category": "健康", "line": "不要把每一个身体感受都立刻变成灾难的证据。", "practice": "区分当下的真实感觉，与你对它的预测。", "source": "个人实相（下）"}, {"id": 19, "category": "关系", "line": "爱不是把对方拉进你的剧本，而是允许两个人都有自由。", "practice": "找到你对某人的一个隐形期待，先把它说给自己听。", "source": "莫子 YT 频道文字"}, {"id": 20, "category": "关系", "line": "别人没有按你期待行动时，先观察你认为那意味着什么。", "practice": "把“他应该”改成“我希望”，看看身体有什么变化。", "source": "终点系统更新到80"}, {"id": 21, "category": "关系", "line": "做你自己，也允许他人做他自己；这是关系里的清醒。", "practice": "今天少替一个人决定一件事。", "source": "中文 Reality Transurfing I–V"}, {"id": 22, "category": "关系", "line": "当你无法停止责怪别人，就暂时看不见自己手中的选择。", "practice": "不否认受伤，只问：“这里有哪一小步是我能做的？”", "source": "内维尔的五堂课"}, {"id": 23, "category": "关系", "line": "恐惧常伪装成爱，它的语气是：“你不能离开我的安全范围。”", "practice": "观察一次关心：它是在给空间，还是在控制？", "source": "双生紫焰 YT 文字大合集"}, {"id": 24, "category": "关系", "line": "你看到的他人，也会穿过你自己的信念滤镜。", "practice": "对一个强烈评价问：“这句话是否也在说我？”", "source": "未知的实相·卷一"}, {"id": 25, "category": "自我", "line": "你不是那个必须把人生表演对的角色，你是能选择如何玩的人。", "practice": "取下一个今天正在戴着的标签：乖、强、成功或有用。", "source": "登出轉化班全集"}, {"id": 26, "category": "自我", "line": "想消灭自我，可能只是另一个更会批评的自我在动手。", "practice": "当你嫌弃自己时，问：“谁正在要求我必须更好？”", "source": "终点系统更新到80"}, {"id": 27, "category": "自我", "line": "你可以全力生活，却不必把自己的价值绑在输赢上。", "practice": "选一件重要的事，认真做，但不用结果定义你。", "source": "终点系统更新到80"}, {"id": 28, "category": "自我", "line": "你不用被塑造成谁；先清理那些不属于你的恐惧和模仿。", "practice": "识别今天的一个“应该”，看它最早是谁说的。", "source": "莫子九紫离火"}, {"id": 29, "category": "自我", "line": "你对改变的恐惧，常来自把外在世界看得比内在选择更强大。", "practice": "为那个一直拖延的变化，只做一个小到不会害怕的动作。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 30, "category": "自我", "line": "你所认同的“我是谁”，会持续挑选你能看见的可能。", "practice": "把“我就是……”改成“我过去常常……”。", "source": "未知的实相·卷二"}, {"id": 31, "category": "显化", "line": "别一直想着如何到达；先练习成为那个已经活在结果里的人。", "practice": "如果愿望已成为日常，你今天的语气会有什么不同？", "source": "莫子综合流动"}, {"id": 32, "category": "显化", "line": "愿望不需要在心里大喊；它需要一个稳定、可居住的内在状态。", "practice": "用一个十秒画面感受愿望完成后的平常。", "source": "内维尔的五堂课"}, {"id": 33, "category": "显化", "line": "真正的意图不是拼命推动现实，而是少一点内在拉扯。", "practice": "为一个目标删掉今天不必要的一次用力。", "source": "中文 Reality Transurfing I–V"}, {"id": 34, "category": "显化", "line": "你想象的不只是画面，而是你在那个画面里成为了谁。", "practice": "别只看结果：感觉那个你的身体姿态和呼吸。", "source": "内维尔书籍 中文版合集"}, {"id": 35, "category": "显化", "line": "越是把愿望变成对当下的否定，越难感觉到它已经开始。", "practice": "问：“现在有哪个 1% 已经在发生？”", "source": "莫子 YT 频道文字"}, {"id": 36, "category": "显化", "line": "给想象一个真实的感觉，然后回到生活；不必反复挖开种子检查。", "practice": "完成今天的想象后，做一件普通的当下小事。", "source": "内维尔书籍 中文版合集"}, {"id": 37, "category": "内观", "line": "情绪越强，越值得先看，不急着把它说成事实。", "practice": "把当下情绪放在身体里定位，不讲故事。", "source": "终点系统更新到80"}, {"id": 38, "category": "内观", "line": "你不需要消灭念头，只需要不再把每个念头都叫作“我”。", "practice": "对一个念头说：“我注意到这个念头。”", "source": "登出键 简体版"}, {"id": 39, "category": "内观", "line": "观察不是冷漠，是让体验有空间自己变化。", "practice": "今天遇到不适时，晚五秒再定义它。", "source": "未知的实相·卷一"}, {"id": 40, "category": "内观", "line": "当你开始证明自己没错，往往已经离开了当下。", "practice": "暂停辩解，先找出你正在保护什么。", "source": "双生紫焰 YT 文字大合集"}, {"id": 41, "category": "内观", "line": "一个感受可以很真，但它不必成为你对未来的预言。", "practice": "把“会一直这样”改成“现在正这样”。", "source": "个人实相（上）"}, {"id": 42, "category": "内观", "line": "你反复注意的东西，会比其他可能显得更像现实。", "practice": "今天主动寻找一个被忽略的好信号。", "source": "中文 Reality Transurfing I–V"}, {"id": 43, "category": "内观", "line": "焦虑在催你立刻得出结论，觉察允许你暂时不知道。", "practice": "今天给一个未知留出十分钟，不搜索答案。", "source": "莫子综合流动"}, {"id": 44, "category": "内观", "line": "你能看见一个模式，就说明你已经不完全被它包住。", "practice": "为今天的一个自动反应取个名字。", "source": "终点系统更新到80"}, {"id": 45, "category": "内观", "line": "先感觉脚底的地面，再处理脑子里的风暴。", "practice": "站稳，感觉双脚的压力与温度。", "source": "终点系统更新到80"}, {"id": 46, "category": "内观", "line": "沉默不是空白，它是让你听见内在噪声的背景。", "practice": "关掉一分钟声音，听见最近和最远的声音。", "source": "神奇之道—赛斯书"}, {"id": 47, "category": "内观", "line": "当下不需要完美，它只需要被你如实地经过。", "practice": "不改变任何事，完整感受十秒。", "source": "25莫子餐叙"}, {"id": 48, "category": "金钱", "line": "金钱焦虑常在问“够不够”，很少问“什么对我真的有价值”。", "practice": "在下一笔花费前，先说出它服务的价值。", "source": "莫子综合流动"}, {"id": 49, "category": "金钱", "line": "不要用别人的数字，衡量你自己的丰盛。", "practice": "写下你真正想要的三种生活感受。", "source": "双生紫焰 YT 文字大合集"}, {"id": 50, "category": "金钱", "line": "害怕失去时抓得越紧，反而越难看见新的流入。", "practice": "清理一个出于恐惧而不再需要的占有。", "source": "中文 Reality Transurfing I–V"}, {"id": 51, "category": "金钱", "line": "收下别人的善意，也是丰盛的一部分。", "practice": "今天被帮助时，只说谢谢，不急着偿还。", "source": "25莫子餐叙"}, {"id": 52, "category": "金钱", "line": "你值得的程度，不会随账户余额一起涨跌。", "practice": "看一眼余额，观察它触发了哪个自我评价。", "source": "内维尔书籍 中文版合集"}, {"id": 53, "category": "金钱", "line": "节省可以来自清醒，也可以来自对未来的恐惧。", "practice": "今天辨认一次：我是在选择，还是在缩小？", "source": "个人实相（下）"}, {"id": 54, "category": "金钱", "line": "真正的富足里，不需要用消费证明自己过得好。", "practice": "推迟一笔用来证明身份的冲动消费。", "source": "莫子综合流动"}, {"id": 55, "category": "金钱", "line": "如果你只允许辛苦的钱进来，轻松的机会就很难被看见。", "practice": "列出一种不靠加时也能创造价值的方式。", "source": "双生紫焰 YT 文字大合集"}, {"id": 56, "category": "金钱", "line": "钱的流出不一定是失去，也可能是价值正在换一种形式回来。", "practice": "为今天的一笔必要支出找到它带来的支持。", "source": "莫子综合流动"}, {"id": 57, "category": "金钱", "line": "不必等到完全不害怕，才开始做更成熟的金钱选择。", "practice": "今天完成一个十分钟内能做的财务整理。", "source": "内维尔的五堂课"}, {"id": 58, "category": "金钱", "line": "当你把金钱当成唯一的力量，就会忘了自己也在创造价值。", "practice": "写下你今天已经创造、却没有标价的价值。", "source": "莫子综合流动"}, {"id": 59, "category": "健康", "line": "身体的疲惫不是背叛，它可能是在替你拒绝无止境的要求。", "practice": "问自己：今天有什么可以不做？", "source": "健康之道（赛斯书）"}, {"id": 60, "category": "健康", "line": "照顾身体不是因为它坏了，而是因为它正在陪你生活。", "practice": "用感谢而非嫌弃的语气，对身体说一句话。", "source": "神奇之道—赛斯书"}, {"id": 61, "category": "健康", "line": "疼痛需要认真对待，但不必被想象成整个未来。", "practice": "有需要就求医；同时只描述此刻真实的感觉。", "source": "健康之道（赛斯书）"}, {"id": 62, "category": "健康", "line": "放松不是另一个必须完成的任务。", "practice": "不改变呼吸，只让下巴和肩膀少用一点力。", "source": "终点系统更新到80"}, {"id": 63, "category": "健康", "line": "对身体的信任，不是忽略症状，而是不把恐惧当成诊断。", "practice": "区分三件事：感觉、事实、担心。", "source": "个人实相（下）"}, {"id": 64, "category": "健康", "line": "身体会记得长期压抑的紧绷，也会学会新的安全感。", "practice": "找一个容易紧的部位，给它一分钟支撑。", "source": "莫子 YT 频道文字"}, {"id": 65, "category": "健康", "line": "健康不只是没有症状，也是你与身体相处时少一些战争。", "practice": "今天不批评镜子里的一个身体细节。", "source": "健康之道（赛斯书）"}, {"id": 66, "category": "健康", "line": "当心里一直说“我不能停”，身体可能会替你按下停止。", "practice": "在身体逼你停之前，主动休息十分钟。", "source": "双生紫焰 YT 文字大合集"}, {"id": 67, "category": "健康", "line": "每一次平稳的呼气，都在告诉神经系统：现在可以少防卫一点。", "practice": "让呼气比吸气长一点，重复五次。", "source": "终点系统更新到80"}, {"id": 68, "category": "健康", "line": "你不需要等身体完美，才允许自己喜欢它。", "practice": "找出身体今天支持你的三件小事。", "source": "个人实相（上）"}, {"id": 69, "category": "健康", "line": "真正的活力有自己的潮汐，不会每一天都以同样的强度出现。", "practice": "今天按真实能量安排一件事，不按理想能量。", "source": "神奇之道—赛斯书"}, {"id": 70, "category": "关系", "line": "关系里最累的常不是分歧，而是一直猜却不直接问。", "practice": "把一个猜测改成一个清楚、不控制的问题。", "source": "25莫子餐叙"}, {"id": 71, "category": "关系", "line": "边界不是惩罚别人，是告诉对方如何才能继续靠近你。", "practice": "用“我可以……我不可以……”说一个边界。", "source": "莫子综合流动"}, {"id": 72, "category": "关系", "line": "对方的沉默是他的沉默，不一定是你不值得被爱的证据。", "practice": "删掉一个你替对方写好的内心剧本。", "source": "双生紫焰 YT 文字大合集"}, {"id": 73, "category": "关系", "line": "你可以理解别人，同时不同意他的做法。", "practice": "练习说：“我能理解，但我不选择这样。”", "source": "中文 Reality Transurfing I–V"}, {"id": 74, "category": "关系", "line": "当你一直在教对方怎么爱你，先看看自己是否在忽略真实的他。", "practice": "区分：我爱的是这个人，还是他应该成为的样子？", "source": "双生紫焰 YT 文字大合集"}, {"id": 75, "category": "关系", "line": "拯救一个人，有时是为了不面对自己的无力感。", "practice": "帮忙前问：他请求了吗？这真的属于我吗？", "source": "登出轉化班全集"}, {"id": 76, "category": "关系", "line": "你对别人最强烈的指责，常带着你对自己的某种禁止。", "practice": "把一个“他怎么能”改成“我不允许自己”。", "source": "个人实相（上）"}, {"id": 77, "category": "关系", "line": "真话不一定要尖锐，温柔也不等于含糊。", "practice": "今天用一句短句说清真实需求。", "source": "25莫子餐叙"}, {"id": 78, "category": "关系", "line": "不再追逐对方的回应，不代表你不爱；也可能是你开始回到自己。", "practice": "把今天等回复的十分钟，还给自己。", "source": "莫子 YT 频道文字"}, {"id": 79, "category": "关系", "line": "道歉的重点不是让对方马上原谅，而是你愿意看见影响。", "practice": "道歉时先不加“但是”。", "source": "个人实相（下）"}, {"id": 80, "category": "关系", "line": "有些关系的成长，不是更靠近，而是终于能不拉扯地分开。", "practice": "允许一个人有他的路，你也回到你的路。", "source": "中文 Reality Transurfing I–V"}, {"id": 81, "category": "自我", "line": "你不必因为曾经选错，就继续对过去保持忠诚。", "practice": "允许自己今天更新一个旧决定。", "source": "未知的实相·卷二"}, {"id": 82, "category": "自我", "line": "对自己严厉不等于诚实，它有时只是熟悉的暴力。", "practice": "把一句自我责骂，改成一句具体的事实。", "source": "登出键 简体版"}, {"id": 83, "category": "自我", "line": "你可以没有把握，仍然做一个忠于自己的选择。", "practice": "找出一个不需要百分之百确定的下一步。", "source": "内维尔的五堂课"}, {"id": 84, "category": "自我", "line": "与别人比较时，你看见的是他的片段，却用来审判自己的全部。", "practice": "今天少看一次别人的进度，多看一次自己的方向。", "source": "莫子九紫离火"}, {"id": 85, "category": "自我", "line": "你不是等待被发现的固定答案，你也在每个选择中创造自己。", "practice": "今天用一个小动作投票给想成为的自己。", "source": "未知的实相·卷一"}, {"id": 86, "category": "自我", "line": "真正的自信不是确定不会失败，是知道失败也不会失去自己。", "practice": "为一件害怕做不好的事，允许一个不完美版本。", "source": "内维尔书籍 中文版合集"}, {"id": 87, "category": "自我", "line": "你累的时候不会比有精神时更没价值。", "practice": "今天不用产出量评估自己的一小时。", "source": "神奇之道—赛斯书"}, {"id": 88, "category": "自我", "line": "改变习惯不等于否定过去的你，是让过去的你不必继续辛苦。", "practice": "感谢一个旧模式曾保护你，再少做它一次。", "source": "登出轉化班全集"}, {"id": 89, "category": "自我", "line": "你可以尊重家人的恐惧，同时不把它继承成自己的命运。", "practice": "识别一个家庭里传来的“不可以”。", "source": "莫子 YT 频道文字"}, {"id": 90, "category": "自我", "line": "做自己不是固执地不变，是变化时仍能听见内在。", "practice": "今天做决定前，先问身体是展开还是收紧。", "source": "莫子九紫离火"}, {"id": 91, "category": "显化", "line": "愿望完成的感觉通常比你想象的更平静，而不是更用力。", "practice": "想象实现后的一个普通早晨。", "source": "内维尔书籍 中文版合集"}, {"id": 92, "category": "显化", "line": "不要一边种下新选择，一边每分钟检查它为什么还没发芽。", "practice": "为一个愿望做完今天的动作，然后离开它。", "source": "内维尔的五堂课"}, {"id": 93, "category": "显化", "line": "当目标变得过度重要，你会把每个波动都解读成失败。", "practice": "把一个目标从“必须”改成“我选择”。", "source": "中文 Reality Transurfing I–V"}, {"id": 94, "category": "显化", "line": "你不需要说服所有人你的新现实是可能的。", "practice": "今天少解释一次，把能量留给行动。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 95, "category": "显化", "line": "想象不是逃离当下，而是为当下选一个新的出发点。", "practice": "想象后立刻做一个与新状态相符的小动作。", "source": "内维尔书籍 中文版合集"}, {"id": 96, "category": "显化", "line": "先成为那个不再为愿望缺席而惩罚自己的人。", "practice": "今天停止一次“还没有”的盘点。", "source": "莫子综合流动"}, {"id": 97, "category": "显化", "line": "现实的延迟不一定是拒绝，它可能只是过程还在组织。", "practice": "为一件尚未显现的事，保留一点中性空间。", "source": "中文 Reality Transurfing I–V"}, {"id": 98, "category": "显化", "line": "一个稳定的小假设，比一百次焦急的肯定更容易被你活出来。", "practice": "选一句你真的说得进身体的新句子。", "source": "内维尔的五堂课"}, {"id": 99, "category": "显化", "line": "你不是在等待一个未来的自己来救现在的你。", "practice": "问：未来的我今天会怎样照顾当下的我？", "source": "莫子 YT 频道文字"}, {"id": 100, "category": "显化", "line": "改变现实的起点，常是不再反复确认旧现实是唯一版本。", "practice": "今天找出一个与旧故事不同的小证据。", "source": "未知的实相·卷二"}, {"id": 101, "category": "内观", "line": "每个念头、情绪或者感受，都像是荧幕上闪现的讯号，纯粹只是被观察到。", "practice": "停十秒，只辨认此刻最响的一个念头。", "source": "终点系统更新到80"}, {"id": 102, "category": "内观", "line": "意识到这点，你便能清醒选择——是宣泄情绪喂养摆锤，还是断其粮草赢得胜利。", "practice": "先说出事实，再说出你为它添加的解释。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 103, "category": "内观", "line": "这是在说观察者意识到所有的体验，包括情绪、感觉、画面等等，其实都源于我自己。", "practice": "把注意力放回呼吸，观察身体哪里最紧。", "source": "终点系统更新到80"}, {"id": 104, "category": "内观", "line": "你开始观察你的思考、你的情绪、你的选择、你的互动，它们就像一行一行的程式码一样。", "practice": "问自己：我现在是在看见，还是在自动反应？", "source": "双生紫焰YT文字大合集"}, {"id": 105, "category": "内观", "line": "感受着，感受此刻，只有你自己以及无边无际的存在感现在，把你的觉察放到你自己的心轮位置。", "practice": "给眼前的情绪命名，但暂时不跟它走。", "source": "终点系统更新到80"}, {"id": 106, "category": "内观", "line": "相反的当你透过观察情绪，意识到这只是坐标，这一个意识到的动作本身就是在降低X轴的认同度。", "practice": "注意一个反复出现的判断，它在保护什么？", "source": "终点系统更新到80"}, {"id": 107, "category": "内观", "line": "如果真的选择登出开悟，决心够的话，你每一个当下都选择登出开悟、安住在觉察，就没有其他的了。", "practice": "把“我就是这样”改成“我此刻正有这个经验”。", "source": "莫子yt频道文字"}, {"id": 108, "category": "内观", "line": "尤其是当我们升起一些浓烈的情绪，而这些情绪是我们不要的时候，我们就可以提醒自己回到觉察的位置来改变当下的情绪。", "practice": "闭眼片刻，听见念头之间短暂的安静。", "source": "双生紫焰YT文字大合集"}, {"id": 109, "category": "内观", "line": "我们觉察每一个出现的念头，我们觉察我们的情绪，觉察我们的感受。", "practice": "观察今天最想控制的一件事，先松开一点。", "source": "终点系统更新到80"}, {"id": 110, "category": "内观", "line": "意识本质就是觉察，觉察就是我们的观察者角度，这个就是我们生命的本质。", "practice": "留意身体的收紧，它比故事更早说真话。", "source": "双生紫焰YT文字大合集"}, {"id": 111, "category": "内观", "line": "这里，只是你回家的过程现在，我们来做一件事，我们观察内在此刻的动摇。", "practice": "遇到不舒服时，先不寻找责任人。", "source": "终点系统更新到80"}, {"id": 112, "category": "内观", "line": "感受一下口腔与鼻腔，是否有残留的感受。", "practice": "把一个绝对化想法改成一个可以验证的问题。", "source": "终点系统更新到80"}, {"id": 113, "category": "内观", "line": "观察你呼吸时空气的冷热，是来自当下还是记忆。", "practice": "看见旧模式出现，今天只少跟随它一次。", "source": "终点系统更新到80"}, {"id": 114, "category": "内观", "line": "没必要花大量时间分析物品的优缺点——此刻参与选择的心智并非真正的你，而是集体意识长期灌输的思维定式。", "practice": "问：如果不急着证明，我真正知道什么？", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 115, "category": "内观", "line": "在这个放松的状态下，开始觉察你内在深处的情绪、担忧，特别是与灾难、与挑战相关的恐惧、焦虑以及其他的负面情绪。", "practice": "让感受存在一分钟，不解释、不压下、不扩大。", "source": "双生紫焰YT文字大合集"}, {"id": 116, "category": "内观", "line": "首先要提升我们安住在觉察的能力，我们会发现，当我们安住在觉察的时候，我们特别能够灵敏的去观察到当下的所有发生，就是这样这个就是洞察力。", "practice": "写下此刻的三个念头，看看哪一个只是猜测。", "source": "双生紫焰YT文字大合集"}, {"id": 117, "category": "内观", "line": "你开始觉察自己的呼吸，觉察念头或情绪的升起。", "practice": "分辨这是现在发生的，还是旧经验被唤醒。", "source": "终点系统更新到80"}, {"id": 118, "category": "内观", "line": "如何去让它显发出来，让你能够感受到你内在的，原原本本的那个意识，就结束了。", "practice": "暂时放下答案，看看问题本身怎样改变。", "source": "双生紫焰YT文字大合集"}, {"id": 119, "category": "内观", "line": "当你开始观察你的想法时，你无法避免意识到只有你自己才是所有进入你世界的原因。", "practice": "注意你正在抗拒的感觉，给它一点空间。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 120, "category": "内观", "line": "而灵这个部分是我们人能够觉知、能够觉察、而且有潜意识等等，我们人有内在的部分。", "practice": "把注意力从别人身上收回，问自己真正需要什么。", "source": "双生紫焰YT文字大合集"}, {"id": 121, "category": "内观", "line": "那个静里面没有任何念头、情绪、形象、认知，但是却有一个清明的存在感，那个存在就是觉察。", "practice": "停十秒，只辨认此刻最响的一个念头。", "source": "终点系统更新到80"}, {"id": 122, "category": "内观", "line": "首先不加批判地观察我对生活的反应，然后当我认为我对自己的选择不满意时，注意我的反应。", "practice": "先说出事实，再说出你为它添加的解释。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 123, "category": "内观", "line": "就像舞台上的演员突然意识到自己正在表演，那一刻起，你就能在参与游戏的同时保持超然观察。", "practice": "把注意力放回呼吸，观察身体哪里最紧。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 124, "category": "内观", "line": "被觉察可以千变万化，世界所有的现象都是被觉察，包括我们的内心内在所有的感受情境，都是被觉察的。", "practice": "问自己：我现在是在看见，还是在自动反应？", "source": "双生紫焰YT文字大合集"}, {"id": 125, "category": "内观", "line": "你只要安静的看着这些云朵去体会一下，当你只是看着，当你不再去抓取念头，不再去抗拒当下任何感受。", "practice": "给眼前的情绪命名，但暂时不跟它走。", "source": "终点系统更新到80"}, {"id": 126, "category": "内观", "line": "将这股平安的感觉，深深地记录在我们的内在现在，逐渐将意识回到当下的空间，感觉自己与环境之间的联系。", "practice": "注意一个反复出现的判断，它在保护什么？", "source": "终点系统更新到80"}, {"id": 127, "category": "内观", "line": "刚刚我们提到站在觉察的位置可以消化掉信念跟这个情绪感受，然后进而把原本显化的现象也消化掉，这是一个消化的状态。", "practice": "把“我就是这样”改成“我此刻正有这个经验”。", "source": "双生紫焰YT文字大合集"}, {"id": 128, "category": "内观", "line": "我们知道它是手机，我们正想着它是手机，我们也同样觉察着手机与知道它是手机的这些信念，这一切都同时存在于此刻，就在这个当下。", "practice": "闭眼片刻，听见念头之间短暂的安静。", "source": "双生紫焰YT文字大合集"}, {"id": 129, "category": "内观", "line": "但是如果我们要进入更深层的故事里面去游玩的当下，比如说我们在吃美食，在玩想玩的东西的时候，我们要去感受那个感觉，这时候我们可以选择进入故事来游玩。", "practice": "观察今天最想控制的一件事，先松开一点。", "source": "双生紫焰YT文字大合集"}, {"id": 130, "category": "内观", "line": "除了我们五种感官所能接触的一切物件外，想法、感受也是我们能觉察的物件，所以不论外在的现象或是内在心里的现象，都是现象，都是可以觉察的物件。", "practice": "留意身体的收紧，它比故事更早说真话。", "source": "登出键 简体版"}, {"id": 131, "category": "内观", "line": "大家想想看，我们有一个意识，我们有一个觉察。", "practice": "遇到不舒服时，先不寻找责任人。", "source": "双生紫焰YT文字大合集"}, {"id": 132, "category": "内观", "line": "如果你意识到你内在的活动，你会看到与你自己有关的一切，你自己的存在。", "practice": "把一个绝对化想法改成一个可以验证的问题。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 133, "category": "内观", "line": "真正的选控选择权、控制权是在你的那个观察，也就是玩家，而不是那个脑袋。", "practice": "看见旧模式出现，今天只少跟随它一次。", "source": "双生紫焰YT文字大合集"}, {"id": 134, "category": "内观", "line": "那些欣喜、开放、灵感的状态，以及压抑、忧郁的情绪，都取决于心灵的内在感受。", "practice": "问：如果不急着证明，我真正知道什么？", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 135, "category": "内观", "line": "你的觉察变成了全部的时候，没有被观察的对象存在，这时候有没有那个有是无比广阔。", "practice": "让感受存在一分钟，不解释、不压下、不扩大。", "source": "双生紫焰YT文字大合集"}, {"id": 136, "category": "内观", "line": "它没办法反映出那个观察者，反而是没什么状态的时候，你自然就会处于一种觉察的情况。", "practice": "写下此刻的三个念头，看看哪一个只是猜测。", "source": "双生紫焰YT文字大合集"}, {"id": 137, "category": "内观", "line": "而且，你常常站在观察者的角色，你已经站稳这个地方了，你要回来看着觉察就比较容易。", "practice": "分辨这是现在发生的，还是旧经验被唤醒。", "source": "双生紫焰YT文字大合集"}, {"id": 138, "category": "内观", "line": "感受其实是根据我们的信念而来的，就是我们此时此刻当下有什么信念，我们就有什么感觉。", "practice": "暂时放下答案，看看问题本身怎样改变。", "source": "双生紫焰YT文字大合集"}, {"id": 139, "category": "内观", "line": "你可以你站在觉察的角度，观察者的角度只有观察而已，其他想与不想都是人物的设定，跟这个无关。", "practice": "注意你正在抗拒的感觉，给它一点空间。", "source": "双生紫焰YT文字大合集"}, {"id": 140, "category": "内观", "line": "只有这样你才能参与到戏剧活动中，并在你自己的生活中保持清醒的觉察，唤醒在你自我内在中的生命。", "practice": "把注意力从别人身上收回，问自己真正需要什么。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 141, "category": "内观", "line": "如果你善于观察，你会注意到你的每一种情绪都会得到迅速的回应，并将其与你的日常生活环境联系起来。", "practice": "停十秒，只辨认此刻最响的一个念头。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 142, "category": "内观", "line": "被觉察的不管是什么东西，即使是你的情绪，我好生气，我看到我自己好生气，生气只是被我自己觉察的对象。", "practice": "先说出事实，再说出你为它添加的解释。", "source": "双生紫焰YT文字大合集"}, {"id": 143, "category": "内观", "line": "只是你可以选择站在觉察的位置去生活，你站在圆满的位置去生活，不会就不回来，就没有回到故事性来，很难。", "practice": "把注意力放回呼吸，观察身体哪里最紧。", "source": "双生紫焰YT文字大合集"}, {"id": 144, "category": "内观", "line": "这时候你小我所有信念起来都是被觉察看到，你这时候看到信念，你不一定要选择这个信念，你也可以选择其他信念。", "practice": "问自己：我现在是在看见，还是在自动反应？", "source": "双生紫焰YT文字大合集"}, {"id": 145, "category": "内观", "line": "无意识让总体意识产生情境，是使用感觉、情绪、情感，所以显现出来的情境，是为了要让我们生起无意识提供的感受而已。", "practice": "给眼前的情绪命名，但暂时不跟它走。", "source": "终点系统更新到80"}, {"id": 146, "category": "内观", "line": "做这个练习可以快速增加你的觉察力，习惯成为一位观察者，除了觉察呼吸，行住坐卧的一切运作，都会变得清清楚楚。", "practice": "注意一个反复出现的判断，它在保护什么？", "source": "登出键 简体版"}, {"id": 147, "category": "内观", "line": "如果你善于观察，你会注意到这条信息中你的每一种情绪都会得到迅速的回应，你将能够把它与你的日常生活情况联系起来。", "practice": "把“我就是这样”改成“我此刻正有这个经验”。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 148, "category": "内观", "line": "你不再是观察者，而是整个宇宙在看自己。", "practice": "闭眼片刻，听见念头之间短暂的安静。", "source": "终点系统更新到80"}, {"id": 149, "category": "内观", "line": "流动不再有边界，你成为那无边的流此刻，不再分别内与外，没有里面，也没有外面。", "practice": "观察今天最想控制的一件事，先松开一点。", "source": "终点系统更新到80"}, {"id": 150, "category": "内观", "line": "随之某些东西就在我内在中萎缩了，非物质的，而是在我的意识里，我的感受和情感里，而这意识和这感受才是人的真正创造性。", "practice": "留意身体的收紧，它比故事更早说真话。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 151, "category": "内观", "line": "随之你们就紧跟着开始转变这个自我，通过一个不加批判的一视同仁的单纯的观察力，你以此发现了这个自我，对这个自我做着觉察。", "practice": "遇到不舒服时，先不寻找责任人。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 152, "category": "内观", "line": "你们可能会选择不相信这一点，但不管你们信不信，你们在外部世界所看到的一切都是在你们的经历之前在你们自己的意识中孕育出来的。", "practice": "把一个绝对化想法改成一个可以验证的问题。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 153, "category": "内观", "line": "一切都是我们的内在的信念，把信念投射在我们意识的镜子里面、荧幕里面，然后去显化出影像、感受，然后我们再回过来去接收这些讯息，这些感受。", "practice": "看见旧模式出现，今天只少跟随它一次。", "source": "双生紫焰YT文字大合集"}, {"id": 154, "category": "内观", "line": "当你看清楚现在觉察正定位在愤怒坐标，这个看见本身就是一种登出，你从那个愤怒的节点抽离出来的，你变成了观察坐标的人，而不是那个坐标本身。", "practice": "问：如果不急着证明，我真正知道什么？", "source": "终点系统更新到80"}, {"id": 155, "category": "内观", "line": "另外一种是你保持着那个观察者进入梦境，自然而然在梦境里面也在一种觉察的状态，在那种觉察的状态里面去解脱，这是两个不同的说法，但是其实都是可以的。", "practice": "让感受存在一分钟，不解释、不压下、不扩大。", "source": "双生紫焰YT文字大合集"}, {"id": 156, "category": "内观", "line": "JOD意思是说你是觉知，你是意识。", "practice": "写下此刻的三个念头，看看哪一个只是猜测。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 157, "category": "内观", "line": "HE意思是说你是对某些事物的觉察和知晓。", "practice": "分辨这是现在发生的，还是旧经验被唤醒。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 158, "category": "内观", "line": "而VAU的意思是你开始意识到去成为那个你所感知到的，你所知晓的事物。", "practice": "暂时放下答案，看看问题本身怎样改变。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 159, "category": "内观", "line": "而当你确信你是所有你所观察到的事物的直接完全责任人，那意味着你完全收回了你的内在力量和权力，你是你自己的主宰，于是你将可以通过内在改变外在的一切。", "practice": "注意你正在抗拒的感觉，给它一点空间。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 160, "category": "内观", "line": "随之你就会在外部现实里去感谢某个人，由于内在发生的一切，而在外部获得体验，这就是生活。", "practice": "把注意力从别人身上收回，问自己真正需要什么。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 161, "category": "内观", "line": "也就是当你意识到这是你不想要的信念时，显化已经完成了。", "practice": "停十秒，只辨认此刻最响的一个念头。", "source": "登出键 简体版"}, {"id": 162, "category": "内观", "line": "念头变动，觉察不动。", "practice": "先说出事实，再说出你为它添加的解释。", "source": "终点系统更新到80"}, {"id": 163, "category": "内观", "line": "情绪波动，觉察还是一样。", "practice": "把注意力放回呼吸，观察身体哪里最紧。", "source": "终点系统更新到80"}, {"id": 164, "category": "内观", "line": "念头很像波浪，情绪就像潮汐一样，但是觉察就是那片海。", "practice": "问自己：我现在是在看见，还是在自动反应？", "source": "终点系统更新到80"}, {"id": 165, "category": "内观", "line": "你让身体左右晃，好，你就会观察到你自己在晃，你觉察到自己在晃。", "practice": "给眼前的情绪命名，但暂时不跟它走。", "source": "双生紫焰YT文字大合集"}, {"id": 166, "category": "内观", "line": "任何可以被觉察、被观察的都是人生的故事，包括我们现在在这里聊天。", "practice": "注意一个反复出现的判断，它在保护什么？", "source": "双生紫焰YT文字大合集"}, {"id": 167, "category": "内观", "line": "重点是在于，你要明白这一切都是意识的本身，也就是那个觉察的本身。", "practice": "把“我就是这样”改成“我此刻正有这个经验”。", "source": "双生紫焰YT文字大合集"}, {"id": 168, "category": "内观", "line": "我们意识到，这些只是被观察到的讯号，不代表我们，更没有什么意义。", "practice": "闭眼片刻，听见念头之间短暂的安静。", "source": "终点系统更新到80"}, {"id": 169, "category": "内观", "line": "你的这种奇妙的意识是最终的现实，你可以自由选择你将要进入的状态。", "practice": "观察今天最想控制的一件事，先松开一点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 170, "category": "内观", "line": "意思是你对你自己所有的信念、念头，所有的情绪都完全敞开，完全接受。", "practice": "留意身体的收紧，它比故事更早说真话。", "source": "终点系统更新到80"}, {"id": 171, "category": "内观", "line": "只是看着，让你的亚当，就是你的觉察，温柔的看着你的夏娃，就是感受。", "practice": "遇到不舒服时，先不寻找责任人。", "source": "终点系统更新到80"}, {"id": 172, "category": "内观", "line": "就是如果他没有观察、没有觉察，他就不省人事，什么都不知道，昏迷不醒。", "practice": "把一个绝对化想法改成一个可以验证的问题。", "source": "双生紫焰YT文字大合集"}, {"id": 173, "category": "内观", "line": "当你变得透明，念头的生死，它就会成为风景，而你，会成为无边的观察者。", "practice": "看见旧模式出现，今天只少跟随它一次。", "source": "终点系统更新到80"}, {"id": 174, "category": "内观", "line": "此刻你没有名字，你没有性别，你没有过去，你只是一团纯粹的明亮的觉察。", "practice": "问：如果不急着证明，我真正知道什么？", "source": "终点系统更新到80"}, {"id": 175, "category": "内观", "line": "在此过程中，不要追踪你的念头，而要觉察信息是令你振奋还是心头沉重。", "practice": "让感受存在一分钟，不解释、不压下、不扩大。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 176, "category": "内观", "line": "那我选择让七显现出来让我自己感受的到我能够体会的到那这个就是显化法则。", "practice": "写下此刻的三个念头，看看哪一个只是猜测。", "source": "双生紫焰YT文字大合集"}, {"id": 177, "category": "内观", "line": "现在，请你闭上眼睛，想一个你最在乎的人，观察你的心里第一个浮现的念头。", "practice": "分辨这是现在发生的，还是旧经验被唤醒。", "source": "双生紫焰YT文字大合集"}, {"id": 178, "category": "内观", "line": "然后观察着呼吸，注意着它就好我们来看看，我们一边呼吸，一边感受看看。", "practice": "暂时放下答案，看看问题本身怎样改变。", "source": "终点系统更新到80"}, {"id": 179, "category": "内观", "line": "你不必进入任何状态，因为你早就在里面现在静静观察，下一个念头的出现。", "practice": "注意你正在抗拒的感觉，给它一点空间。", "source": "终点系统更新到80"}, {"id": 180, "category": "内观", "line": "你现在把情绪放在桌上，你不去推开它，也不去抓住它，你只是在旁边觉察它。", "practice": "把注意力从别人身上收回，问自己真正需要什么。", "source": "终点系统更新到80"}, {"id": 181, "category": "内观", "line": "在你这具肉体这堆念头的背后，那个清明不动、永远平安的觉察才是真正的你。", "practice": "停十秒，只辨认此刻最响的一个念头。", "source": "终点系统更新到80"}, {"id": 182, "category": "内观", "line": "你发现了领悟了你自己的意识觉知，你内在想象力，就是这圣大的无限智慧。", "practice": "先说出事实，再说出你为它添加的解释。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 183, "category": "内观", "line": "念头越急着替你下结论，越值得先被看见而不是被相信。", "practice": "把注意力放回呼吸，观察身体哪里最紧。", "source": "综合提炼"}, {"id": 184, "category": "金钱", "line": "如果你想变得富有，却不相信自己是财富的源泉，那么你将继续因为保持贫穷而失去目标。", "practice": "看一眼账户，只记录数字，不评价自己的价值。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 185, "category": "金钱", "line": "在流动态里，你不追逐物质，但你内在圆满，没有任何缺乏需要去外在填补。", "practice": "为今天的一笔支出说清它真正服务了什么。", "source": "终点系统更新到80"}, {"id": 186, "category": "金钱", "line": "那你装到的金钱的数量就不一样，所以每个人这种主动的收入，他的数量就不一样了。", "practice": "做一个小而具体的财务选择，不用恐惧推动。", "source": "双生紫焰YT文字大合集"}, {"id": 187, "category": "金钱", "line": "但也要懂得珍视金钱——若连路边的硬币都懒得弯腰拾起，说明你缺乏对金钱的基本尊重。", "practice": "分辨这次购买来自需要、喜悦，还是证明。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 188, "category": "金钱", "line": "露丝出生时是一个非常贫穷的女孩，她渴望财富，她一直认为自己嫁给了一个非常富有的人。", "practice": "把“我不够”改成一个可执行的下一步。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 189, "category": "金钱", "line": "如果你认为你什么都不做就是一个没有价值的人，你这个观点，这个信念就会让你没有被动收入。", "practice": "感谢一笔已经发生的流入或被支持。", "source": "双生紫焰YT文字大合集"}, {"id": 190, "category": "金钱", "line": "或许你以为你追求的是社会地位或是金钱财富，其实背后那个真正追求的，那个才是彻底的自由。", "practice": "查看一个长期回避的数字，先不责备自己。", "source": "终点系统更新到80"}, {"id": 191, "category": "金钱", "line": "这时候你会自然而然拥有金钱，而不是去追逐那一点点用来交换物质世界交易的一种工具，不是这个。", "practice": "今天留下一小部分资源给未来的自己。", "source": "双生紫焰YT文字大合集"}, {"id": 192, "category": "金钱", "line": "当你不再把金钱当成一种力量的象征，钱反而会主动的靠近你，因为你不再排斥它了，这就是空的丰盛。", "practice": "问：如果不比较，我认为什么才叫足够？", "source": "莫子综合流动"}, {"id": 193, "category": "金钱", "line": "假如你认为你什么都不做，你就有一个价值，而那个价值你值多少的价值，你可以把它换算成金钱来看待。", "practice": "拒绝一次因为焦虑而仓促作出的金钱决定。", "source": "双生紫焰YT文字大合集"}, {"id": 194, "category": "金钱", "line": "又或者你开公司，你雇佣了一些员工，员工帮你去生产，然后你获得了一部分的金钱，那这也是属于被动收入。", "practice": "把一个财富目标拆成今天十分钟能做的事。", "source": "双生紫焰YT文字大合集"}, {"id": 195, "category": "金钱", "line": "如果你渴望财富，却不知道这种力量，你将继续贫穷，因为你在外面寻找一位神，试图强迫他给你财富以获得功绩。", "practice": "辨认一个从家里继承来的金钱信念。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 196, "category": "金钱", "line": "若与核心目标无关，确实难以保证它能带来收入。", "practice": "允许自己在花钱前停一下，而不是立刻压抑。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 197, "category": "金钱", "line": "但若确认这就是你命中注定的道路，它终将带来富足生活的一切要素。", "practice": "把价格和价值分开写在两行。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 198, "category": "金钱", "line": "成功的祈祷必须是索求而不是乞求——因此，如果你想祈祷财富，那么就从你的贫穷画面转向否认你感官的证据，并假设你富有的本质。", "practice": "今天练习自然地接住一次帮助或赞美。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 199, "category": "金钱", "line": "如果你离开了贫穷、疾病或虚弱的状态，进入了财富、健康或力量的状态——你的朋友们都知道这一点——你就会从以前的局限中解脱出来。", "practice": "为一项真实能力标出更诚实的价值。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 200, "category": "金钱", "line": "这些在数量上有多少。", "practice": "检查一项自动续费，让资源回到有意识的选择。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 201, "category": "金钱", "line": "这就是为什么我说你的价值观改变了，生活的意义也改变了，因为你不会出卖为世界所有财富打开的眼睛。", "practice": "少做一次为了显得成功而产生的消费。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 202, "category": "金钱", "line": "你不会用它来换取现在世界上对所谓的伟大人物的任何认可。", "practice": "给金钱安排方向，而不是只盯着它的多少。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 203, "category": "金钱", "line": "比如说我认为我是一个没有被动收入，我是一个存在着并没有价值的人。", "practice": "完成一个能让资源更顺畅的小整理。", "source": "双生紫焰YT文字大合集"}, {"id": 204, "category": "金钱", "line": "他厌倦了贫穷，梦想着财富，他的世界充满了能带来越来越多赚钱机会的人。", "practice": "看一眼账户，只记录数字，不评价自己的价值。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 205, "category": "金钱", "line": "钟摆真正渴求的从来不是金钱，而是人们看着财富蒸发时产生的负面能量。", "practice": "为今天的一笔支出说清它真正服务了什么。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 206, "category": "金钱", "line": "他出生于一个非常非常贫穷的男孩，自由从来没有真正使金钱成为生活的目标。", "practice": "做一个小而具体的财务选择，不用恐惧推动。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 207, "category": "金钱", "line": "感觉贫穷的人会吸引贫穷，他们不知道如果他们感觉富有，他们就会吸引财富。", "practice": "分辨这次购买来自需要、喜悦，还是证明。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 208, "category": "金钱", "line": "金钱来时欣然接纳，但切勿为钱财不足或花费而忧心忡忡，否则财富只会日渐缩水。", "practice": "把“我不够”改成一个可执行的下一步。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 209, "category": "金钱", "line": "金钱是能量，它自然的流向频率最高的我允许宇宙透过无限的管道将财富显化在我的生活里。", "practice": "感谢一笔已经发生的流入或被支持。", "source": "终点系统更新到80"}, {"id": 210, "category": "金钱", "line": "如果一个天生富有的人不知道支持财富的原则，那么他可能会失去金钱，再也不会得到它。", "practice": "查看一个长期回避的数字，先不责备自己。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 211, "category": "金钱", "line": "提醒你在这个当下可以暂时把物质的想法稍微放下来一下下，然后去关注自己更灵性的那一面。", "practice": "今天留下一小部分资源给未来的自己。", "source": "双生紫焰YT文字大合集"}, {"id": 212, "category": "金钱", "line": "比如说我是具有价值的，我住豪宅理所当然，我是具有价值的，我可以开更好的车，这些都是物质的。", "practice": "问：如果不比较，我认为什么才叫足够？", "source": "双生紫焰YT文字大合集"}, {"id": 213, "category": "金钱", "line": "我可以给她金钱上的保障，但我们这个小岛上的革命可能会毁掉家族的财富——那么保障在哪里呢。", "practice": "拒绝一次因为焦虑而仓促作出的金钱决定。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 214, "category": "金钱", "line": "但是这个机制只是一个第二层级的机制，一般我们所知道的有关于金钱财富的理论，谈到这里就结束了。", "practice": "把一个财富目标拆成今天十分钟能做的事。", "source": "双生紫焰YT文字大合集"}, {"id": 215, "category": "金钱", "line": "她告诉我，在她的一生中，她从来没有想要过什么东 ": "当健康无虞时，你根本不会去想它，自然也不会辐射出疾病摆锤特有的能量频率。", "practice": "问身体现在最需要的是水、食物、休息还是活动。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 269, "category": "健康", "line": "好，慢慢的做个深呼吸，感觉一下这个呼吸不是你在呼吸，是宇宙透过这个身体在呼吸。", "practice": "今天提前二十分钟结束一项消耗。", "source": "终点系统更新到80"}, {"id": 270, "category": "健康", "line": "他没有意识到，在某种程度上，他自己对健康或疾病的感觉吸引了他正在经历的疾病。", "practice": "用身体感受记录状态，不只用效率评价。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 271, "category": "健康", "line": "你可能生活在一个健康的状态，不知道身体上的痛苦，但你会因为失去一个朋友而痛苦。", "practice": "把一个健康目标缩小到此刻可以完成的动作。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 272, "category": "健康", "line": "你光做这些动作，什么左右晃、前后晃、旋转，你的生病就会很少了，你的身体会非常健康。", "practice": "留意疼痛或疲惫，但不立刻把它写成灾难。", "source": "双生紫焰YT文字大合集"}, {"id": 273, "category": "健康", "line": "随着你继续深呼吸，感受每一口吸气都带来更高频的能量，这些能量渗透到你每一个细胞中。", "practice": "吃下一口时放慢速度，真正尝到它。", "source": "双生紫焰YT文字大合集"}, {"id": 274, "category": "健康", "line": "但是我们要注意的一点是，我们的呼吸一定要顺畅，如果呼吸不顺畅的话，我们身体就会不好。", "practice": "离开屏幕两分钟，让眼睛看向远处。", "source": "双生紫焰YT文字大合集"}, {"id": 275, "category": "健康", "line": "现在将注意力带回呼吸，正常的呼吸，吸气时新鲜的空气进入身体，呼气时感受到放松与宁静。", "practice": "给身体一句感谢，而不是新的命令。", "source": "双生紫焰YT文字大合集"}, {"id": 276, "category": "健康", "line": "摩西律法要求当麻风病人从疾病中康复时，他必须向牧师展示自己，以获得恢复健康的证明。", "practice": "拒绝一次透支式坚持。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 277, "category": "健康", "line": "坚持要求拥有健康的身体和健康的头脑，当你进入并客观化健康状态时，你的假设将变为事实。", "practice": "观察今天什么时候呼吸最浅。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 278, "category": "健康", "line": "如果呢，你要清除你的疾病的时候，这时候你就想着你身体有什麽疾病，在这个光芒之中就得到治癒。", "practice": "允许恢复有自己的速度，不和昨天比较。", "source": "双生紫焰YT文字大合集"}, {"id": 279, "category": "健康", "line": "全身的正常细胞，请你们维持正常，听到这段声音的所有细胞，拥有强壮、健康、快乐，以此成就。", "practice": "做一个让身体觉得安全的小动作。", "source": "双生紫焰YT文字大合集"}, {"id": 280, "category": "健康", "line": "请你深深的呼吸，把这份绝对主宰的频率吸进你每一个细胞里，记住这种感觉，这就是你回家的一个路标。", "practice": "把“必须撑住”改成“我可以调整节奏”。", "source": "终点系统更新到80"}, {"id": 281, "category": "健康", "line": "呼吸时不要只觉得你在吸氧气，试着观想你正在吸入这个宇宙最原始的光子，让这些光充满你每一个细胞。", "practice": "为睡前留出一段没有信息输入的时间。", "source": "终点系统更新到80"}, {"id": 282, "category": "健康", "line": "你可能会问，你的身体怎么能包含数十亿个细胞，或者你的大脑怎么能包含数十亿个原子——我不知道。", "practice": "轻轻活动最僵硬的部位，不追求强度。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 283, "category": "健康", "line": "今天这个方法是针对你认为，你还有一个身体存在的这个状态，然后来进行的一种疗法，我把它称为细胞疗法。", "practice": "把注意力放在身体仍然运作良好的地方。", "source": "双生紫焰YT文字大合集"}, {"id": 284, "category": "健康", "line": "在这个层次上，你的身体是充满活力和美妙的，但你无法将它与那件光芒四射的衣服相比，那是你变形的自我。", "practice": "记录一种让你更有活力的日常选择。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 285, "category": "健康", "line": "你不仅是这个奇妙身体的一员——分享所有事物的目的和目的——而且你是身体，因为你是它充满活力的精神。", "practice": "遇到身体担忧时，区分感觉、推测和专业判断。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 286, "category": "健康", "line": "当你的鼻子不再吸入空气的时候，这时候你的身体会开始呼吸，你会觉得你的呼吸是借由身体在一呼一吸、一呼一吸。", "practice": "今天把照顾自己放进日程，而不是留到有空。", "source": "双生紫焰YT文字大合集"}, {"id": 287, "category": "健康", "line": "当你闭上眼睛，身体静止不动时，你会产生一种类似睡眠的状态，并开始行动，就好像你是扮演这个角色的演员一样。", "practice": "把肩膀放下，做三次缓慢而完整的呼气。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 288, "category": "健康", "line": "如果我想要变魔术般的健康，医生告诉我我无法战胜我的疾病，我相信他们，我已经做出了选择，必须为此承担责任。", "practice": "问身体现在最需要的是水、食物、休息还是活动。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 289, "category": "健康", "line": "闭上你的眼睛，让你的身体慢慢静下来，让呼吸成为唯一的节奏，像海浪一样轻轻拍打着你的内在的岸边好，我们吸气。", "practice": "今天提前二十分钟结束一项消耗。", "source": "终点系统更新到80"}, {"id": 290, "category": "健康", "line": "现在深深的吸一口气，把这种美好的感觉深深的吸入体内，让身体的每一个细胞都知道，你现在就是一个拥有无尽财富的人。", "practice": "用身体感受记录状态，不只用效率评价。", "source": "双生紫焰YT文字大合集"}, {"id": 291, "category": "健康", "line": "如果你今晚以一百岁的高龄去世，你的身体完全失去了活力，精神错乱了，那么在你离开神仙之后，你就不会精神错乱了。", "practice": "把一个健康目标缩小到此刻可以完成的动作。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 292, "category": "健康", "line": "是的，你错过了接触——小小的身体接触，但穿上它的人现在又穿上了一件和它一样的衣服，但很年轻——完全年轻健康。", "practice": "留意疼痛或疲惫，但不立刻把它写成灾难。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 293, "category": "健康", "line": "代表说你的身体已经是累的，他应该要睡眠的，只是你因为某一些信念把它撑着，当那些信念被放下之后，那你就马上就睡着了。", "practice": "吃下一口时放慢速度，真正尝到它。", "source": "莫子综合流动"}, {"id": 294, "category": "健康", "line": "当你继续下去，你的身体的呼吸也会慢慢的减弱，到一个程度的时候，整个身体的呼吸它会停住，你气脉的运作也会好像停住一样。", "practice": "离开屏幕两分钟，让眼睛看向远处。", "source": "双生紫焰YT文字大合集"}, {"id": 295, "category": "健康", "line": "继续深呼吸，感觉着身体与座椅或者地面上的接触点，感受完全被支持的安全感现在，轻轻地伸展你的脊椎，让背部挺直和放松。", "practice": "给身体一句感谢，而不是新的命令。", "source": "终点系统更新到80"}, {"id": 296, "category": "健康", "line": "你只需要允许重力接管你的身体，允许地球母亲托住你的重量，允许我的声音像水流一样流进你的耳朵，流进你的大脑，流进你的细胞。", "practice": "拒绝一次透支式坚持。", "source": "终点系统更新到80"}, {"id": 297, "category": "健康", "line": "看到他今天身体健康，经济有保障，你可能会忘记你做了什么，甚至他也可能会忘记他曾经请求过你的帮助——但这又有什么关系呢。", "practice": "观察今天什么时候呼吸最浅。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 298, "category": "健康", "line": "想像这颗星星散发出柔和的金色光芒，光芒缓缓的降下，穿过你的头顶，进入你的身体遍布全身，感受这股温暖充满活力的能量在身体里流动。", "practice": "允许恢复有自己的速度，不和昨天比较。", "source": "双生紫焰YT文字大合集"}, {"id": 299, "category": "健康", "line": "从手段转向终极目标。", "practice": "做一个让身体觉得安全的小动作。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 300, "category": "健康", "line": "如果以我们旧有的身体去接受新的能量，会产生很多问题，包括一些症状啊、不适应啊，以及你对新的世界没办法融入，你也没办法更轻松的驾驭这个新的世界。", "practice": "把“必须撑住”改成“我可以调整节奏”。", "source": "双生紫焰YT文字大合集"}, {"id": 301, "category": "健康", "line": "我们都是根据他的目的被召唤的，当你所代表的石头在他的眼中准备好了——不是因为你的健康，而是因为那是它被纳入复活的主的身体的时候，你将被召唤。", "practice": "为睡前留出一段没有信息输入的时间。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 302, "category": "健康", "line": "你会知道每个人最终都会拥有它。", "practice": "轻轻活动最僵硬的部位，不追求强度。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 303, "category": "健康", "line": "但他在自己的好时光，一个接一个地召唤我们，用活石建造他的活庙——一种赋予生命的精神，而不仅仅是充满活力的身体。", "practice": "把注意力放在身体仍然运作良好的地方。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 304, "category": "健康", "line": "当我们的身体产生了阴阳的平衡的时候，我的身体就处于一种健康的状态。", "practice": "记录一种让你更有活力的日常选择。", "source": "双生紫焰YT文字大合集"}, {"id": 305, "category": "健康", "line": "基本上做两次的呼吸，我们身体储存的能量，吸收的能量已经非常的巨大。", "practice": "遇到身体担忧时，区分感觉、推测和专业判断。", "source": "双生紫焰YT文字大合集"}, {"id": 306, "category": "健康", "line": "随着这些方面的发达，我们身体细胞的修复也会到达一种相当不同的水平。", "practice": "今天把照顾自己放进日程，而不是留到有空。", "source": "双生紫焰YT文字大合集"}, {"id": 307, "category": "健康", "line": "我知道它们并没有消失，但已经恢复，穿上新的、年轻的、健康的身体。", "practice": "把肩膀放下，做三次缓慢而完整的呼气。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 308, "category": "健康", "line": "许多迄今为止被认为纯粹是身体上的疾病，现在被认为是源于情绪紊乱。", "practice": "问身体现在最需要的是水、食物、休息还是活动。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 309, "category": "健康", "line": "然后我用火焚法置入一个健康的讯息，我身体非常健康，没有任何的慢性病。", "practice": "今天提前二十分钟结束一项消耗。", "source": "双生紫焰YT文字大合集"}, {"id": 310, "category": "关系", "line": "用爱来代表一切，因为当你这样做的时候，你就是在自己身上使用它，因为没有其他人。", "practice": "回应前先复述对方真正说了什么。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 311, "category": "关系", "line": "在世界上所有可爱的事情上，你都按照自己的方式去做，并允许别人做他们想做的事。", "practice": "分辨你的需要和你对对方的要求。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 312, "category": "关系", "line": "当你为他人去想象去设想的时候，你实际上就是把你所设想的给了你自己，因为没有别人。", "practice": "今天清楚说出一个温和的“不”。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 313, "category": "关系", "line": "当你因为接受自己的想象力是生命现象的唯一原因而无法责怪他人时，你就吃了面包，喝了血。", "practice": "把“你总是”换成这一次具体发生的事。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 314, "category": "关系", "line": "永远用你的想象力去爱你自己和他人，因为世界上的每个人都是你自己，因为除了自我什么都没有。", "practice": "问：我是在连接，还是在争取正确？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 315, "category": "关系", "line": "你既做不好别人期待你的这个事情，或者希望你成为什么样的人，你没办法好好的成为那个人，你更加没办法成为你自己。", "practice": "允许对方有不同感受，不急着修正。", "source": "双生紫焰YT文字大合集"}, {"id": 316, "category": "关系", "line": "重要的是你的观念，不是对别人的，而是对你自己的，这是因为你对你自己所持的观念，在决定着你对其他人所持的观念。", "practice": "表达一个需要，不用指责包装。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 317, "category": "关系", "line": "不要试图分析你的欲望或责怪你自己，因为当你这样做的时候，你会发现无数不可爱的东西，当它们被思考的时候，它们就形成了。", "practice": "暂停一次猜心，直接问一个开放的问题。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 318, "category": "关系", "line": "当你尝试它时，它会在测试中证明自己，当它在表演中证明自己时，其他人说什么有什么关系，或者在理性的头脑看来它有多不健全。", "practice": "看见你想改变对方的地方，先回到自己。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 319, "category": "关系", "line": "虽然你说我不应该关心自己影响他人，因为植根于我的世界将扮演他们必须扮演的角色，如果我对我的目标有信心的话。", "practice": "给一段关系留出不立即回复的空间。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 320, "category": "关系", "line": "但是我有什么权利影响别人呢。", "practice": "承认一次自己的投射，不把它变成自责。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 321, "category": "关系", "line": "相反，你与表面上的其他人作战，就好像他们是你的敌人。", "practice": "把讨好换成诚实而简短的表达。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 322, "category": "关系", "line": "很多人都会觉得自己没有被爱，很需要别人的爱，这是一个很有趣的事情。", "practice": "感谢一个常被你视为理所当然的支持。", "source": "双生紫焰YT文字大合集"}, {"id": 323, "category": "关系", "line": "真正的爱是自由的，真正的爱是允许对方存在，不论他是否满足你的期待。", "practice": "在靠近之前，先确认自己的边界。", "source": "双生紫焰YT文字大合集"}, {"id": 324, "category": "关系", "line": "别人做什么都没有区别。", "practice": "今天少解释一次，多听完整一句。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 325, "category": "关系", "line": "种植爱，善良的思想，你将在行动中得到祝福。", "practice": "允许一段不适合的互动自然结束。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 326, "category": "关系", "line": "不必担心别人在使用你的能量，你赠予他人的那点多余能量终将回馈于你。", "practice": "面对冲突时，先照顾自己的身体稳定。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 327, "category": "关系", "line": "任何时候，当你代表他人充满爱心地发挥你的想象力时，你都做了正确的事情。", "practice": "说出事实、感受和请求，不替对方下结论。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 328, "category": "关系", "line": "一个不爱别人或多疑的人，他觉得别人在利用他，他相信的东西会吸引他自己。", "practice": "把被理解的渴望先给自己一点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 329, "category": "关系", "line": "如果我对自己有一个高贵、有尊严的概念，我就永远不会看到别人不可爱的一面。", "practice": "问：这份付出是自愿，还是在交换认可？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 330, "category": "关系", "line": "在那个融合的时刻，我知道自己是爱，虽然别人看不见，但我穿上了爱的身体。", "practice": "回应前先复述对方真正说了什么。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 331, "category": "关系", "line": "我一定要用爱对待他，或是宽恕自己显化这些现象，然后就继续维持跟他的关系吗。", "practice": "分辨你的需要和你对对方的要求。", "source": "双生紫焰YT文字大合集"}, {"id": 332, "category": "关系", "line": "有些人在冲刺期会觉得非常有爱心，想去帮助别人改变环境，那可是小我在转移注意力。", "practice": "今天清楚说出一个温和的“不”。", "source": "终点系统更新到80"}, {"id": 333, "category": "关系", "line": "人类总是为自己的现状而责怪他人，并将继续这样做，直到他发现自己是一切的原因。", "practice": "把“你总是”换成这一次具体发生的事。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 334, "category": "关系", "line": "听到别人的成功并感受到他们的喜悦，就形成了一个结构，它将自己投射到空间的屏幕上。", "practice": "问：我是在连接，还是在争取正确？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 335, "category": "关系", "line": "每一天都给我提供了一个机会，让我发挥自己的想象力，并代表他人满怀爱心地使用它。", "practice": "允许对方有不同感受，不急着修正。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 336, "category": "关系", "line": "想象力是世界的救赎力量，你实际上是在用一种充满爱的奇妙方式来调解神与人之间的关系。", "practice": "表达一个需要，不用指责包装。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 337, "category": "关系", "line": "当你想要恋爱的时候，你就扮演一个深情的伴侣，但心里不需要有占有欲，因为神本身就是爱。", "practice": "暂停一次猜心，直接问一个开放的问题。", "source": "终点系统更新到80"}, {"id": 338, "category": "关系", "line": "但是在生活里我们每天都在做这个事，你遇到的每一个别人，其实都是你内在某个碎片的投射。", "practice": "看见你想改变对方的地方，先回到自己。", "source": "终点系统更新到80"}, {"id": 339, "category": "关系", "line": "父母的爱常常夹着期待，例如你要乖、你要听话、你要成为他们想要的样子，否则他们就会失望。", "practice": "给一段关系留出不立即回复的空间。", "source": "双生紫焰YT文字大合集"}, {"id": 340, "category": "关系", "line": "也许你觉得有必要责怪别人——找个替罪羊，相信原因是你吃了或喝了什么——但你为什么这么做。", "practice": "承认一次自己的投射，不把它变成自责。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 341, "category": "关系", "line": "选择可爱的事物，但不要说有另一个创造者，因为如果有另一个创造者，那么我们就处于冲突之中。", "practice": "把讨好换成诚实而简短的表达。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 342, "category": "关系", "line": "这会让影响别人的东西，对你毫无影响。", "practice": "感谢一个常被你视为理所当然的支持。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 343, "category": "关系", "line": "种下喜乐，慈爱，友善和宽宏的想法，你这样做将会被祝福。", "practice": "在靠近之前，先确认自己的边界。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 344, "category": "关系", "line": "如果它们消失在你的世界里，那也没关系，因为你就是爱，他或她就是爱。", "practice": "今天少解释一次，多听完整一句。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 345, "category": "关系", "line": "最终，所有人都是一体的。", "practice": "允许一段不适合的互动自然结束。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 346, "category": "关系", "line": "或者说比如说我看见我的小孩儿，那你也说没有他人，没有他人，就是说那就是我，他投他是我投射出的情景。", "practice": "面对冲突时，先照顾自己的身体稳定。", "source": "莫子综合流动"}, {"id": 347, "category": "关系", "line": "尽管你和我遭受了所有的痛苦——其他人也遭受了痛苦，并将继续遭受痛苦——但这一切背后都有一种爱。", "practice": "说出事实、感受和请求，不替对方下结论。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 348, "category": "关系", "line": "然后你说你爱我，但任何时候，当你的想象力被运用到其他人的行为上，而不是被爱的运用，你都不会喂我。", "practice": "把被理解的渴望先给自己一点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 349, "category": "关系", "line": "当你第一次见面时，你被性解雇了，如果爱情保持在婚前的状态，当性消失时，你会发现你们的关系越来越深。", "practice": "问：这份付出是自愿，还是在交换认可？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 350, "category": "关系", "line": "而当你开始盘算将花朵制成香水牟利，甚至创立花卉宗教时，理想化便蚕食了真爱，病态的依附关系由此生根。", "practice": "回应前先复述对方真正说了什么。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 351, "category": "关系", "line": "你的思维将清除那些无用的杂物与他人的东西，放弃对实现手段的无效追寻，只需将必要任务投射到你的世界层面。", "practice": "分辨你的需要和你对对方的要求。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 352, "category": "关系", "line": "你说一切都是投射，所以不处理关系、不负责任、不回应痛苦。", "practice": "今天清楚说出一个温和的“不”。", "source": "双生紫焰YT文字大合集"}, {"id": 353, "category": "关系", "line": "你说一切本空，所以不看创伤、不接触情绪、不碰身体。", "practice": "把“你总是”换成这一次具体发生的事。", "source": "双生紫焰YT文字大合集"}, {"id": 354, "category": "关系", "line": "你不是活在一个现实中，而是活在你对现实的感知与诠释里面这里没有真正的别人，只有你对别人的感觉、想象、记忆跟投射。", "practice": "问：我是在连接，还是在争取正确？", "source": "终点系统更新到80"}, {"id": 355, "category": "关系", "line": "我在脑海中描绘出我希望她成为的样子，并说服自己，她就是我所相信和希望她成为的样子。", "practice": "允许对方有不同感受，不急着修正。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 356, "category": "关系", "line": "你相信剧情、你投入感情，你为每一个转折而焦虑，你会怕失去爱、怕失业失败、怕别人不懂你。", "practice": "表达一个需要，不用指责包装。", "source": "终点系统更新到80"}, {"id": 357, "category": "关系", "line": "你会争、会哭、会努力、也会崩溃。", "practice": "暂停一次猜心，直接问一个开放的问题。", "source": "终点系统更新到80"}, {"id": 358, "category": "关系", "line": "我们相信世界是独立于我们的感知而发生的，但我们没有意识到我们的梦想正投射在这个空间屏幕上，我们与我们的梦想发生冲突。", "practice": "看见你想改变对方的地方，先回到自己。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 359, "category": "关系", "line": "这一次，梦不是叫你赚更多钱，而是叫你对齐宇宙。", "practice": "给一段关系留出不立即回复的空间。", "source": "双生紫焰YT文字大合集"}, {"id": 360, "category": "关系", "line": "如果你创造了一个场景，暗示着你的愿望得到了满足，并一直沉浸在其中，直到你内心确信它是真实的，那么别人怎么想又有什么关系呢。", "practice": "承认一次自己的投射，不把它变成自责。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 361, "category": "关系", "line": "你知道会有什么解脱。", "practice": "把讨好换成诚实而简短的表达。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 362, "category": "关系", "line": "现在在我面前是福是祸。", "practice": "感谢一个常被你视为理所当然的支持。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 363, "category": "关系", "line": "我可以接受你不喜欢我的事实。", "practice": "在靠近之前，先确认自己的边界。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 364, "category": "关系", "line": "没关系，你可以爱我。", "practice": "今天少解释一次，多听完整一句。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 365, "category": "关系", "line": "但如果我接受你不喜欢我，不喜欢教学的事实，我会浪费时间。", "practice": "允许一段不适合的互动自然结束。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 366, "category": "关系", "line": "如果在你与他人的心理对话中，你像以前那样与他们交谈，那么你没有改变你的自我概念，因为自我概念的所有变化都会导致与世界的关系发生变化。", "practice": "面对冲突时，先照顾自己的身体稳定。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 367, "category": "关系", "line": "他不知道雅各布——你天性中女性的一部分——是与主结婚的，而主是如此爱他的妻子，以至于他已经抛弃了其他人的一切想法，并且正在创造一对。", "practice": "说出事实、感受和请求，不替对方下结论。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 368, "category": "关系", "line": "与你——他的妻子——产生了亲密关系-直到你们成为一体，你们才是唯一的肉体。", "practice": "把被理解的渴望先给自己一点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 369, "category": "关系", "line": "在你有了这些经历之后，你将拥有与以往一样的社交聚会。", "practice": "问：这份付出是自愿，还是在交换认可？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 370, "category": "关系", "line": "你可以爱这个世界上的每一个人，在为他人做好事时，你会发现超越你最疯狂梦想的快乐。", "practice": "回应前先复述对方真正说了什么。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 371, "category": "关系", "line": "但是你听我们在诠释的有些东西跟别人会听起来比较接近。", "practice": "分辨你的需要和你对对方的要求。", "source": "双生紫焰YT文字大合集"}, {"id": 372, "category": "关系", "line": "然后有些东西跟其他人又比较接近，是因为这个世界运作着情形、运作着情况，那就有部分的人，去提出某部分的理论，是接近真相的。", "practice": "今天清楚说出一个温和的“不”。", "source": "双生紫焰YT文字大合集"}, {"id": 373, "category": "自我", "line": "相反的，我们了解自己是玩家，而非我们假认的自我时，我们就会更自由，拥有选择的主导权。", "practice": "做一件不需要向任何人证明的小事。", "source": "登出键 简体版"}, {"id": 374, "category": "自我", "line": "这种迁移总是从乐观的起点开始渐变，因而世界永远不会整体堕入地狱——每个人 你选择认同哪个州，大卫都会戴上你称之为自己的面具。", "practice": "允许自己改变曾经公开表达过的看法。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 388, "category": "自我", "line": "你也可以选择跳出去，让自己进入更高的共振，更多自由的世界。", "practice": "记下一件只有你知道自己已尽力的事。", "source": "莫子综合流动"}, {"id": 389, "category": "自我", "line": "想像自己与所有生命用爱来相连接，深深感受到自我接纳与内心的平静。", "practice": "把“应该成为谁”换成“此刻愿意怎样活”。", "source": "双生紫焰YT文字大合集"}, {"id": 390, "category": "自我", "line": "那我们要让自己如鱼得水，就必须改变对自我的认同，也就是对自我的看法。", "practice": "对一个小错误停止追加惩罚。", "source": "双生紫焰YT文字大合集"}, {"id": 391, "category": "自我", "line": "人们追求自由，但因为没有看穿信念的本质，他们得到的只是监狱颜色的选择权。", "practice": "承认一种能力，也承认它不必时时被使用。", "source": "双生紫焰YT文字大合集"}, {"id": 392, "category": "自我", "line": "我可以自我授予自由，我让我自己自由，IamsetmeFREE。", "practice": "今天为真实的自己腾出十分钟。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 393, "category": "自我", "line": "为自我价值而战的挣扎会耗尽你的自由能量，将其导入与可能性之流的对抗，并制造招致平衡力量的失衡势能。", "practice": "做一件不需要向任何人证明的小事。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 394, "category": "自我", "line": "我们常常会，在包装自己、建立自己的这个自我认同上，我们是会有一个雏形的、有一个样子，就是我们认为我们自己是什么样的样子。", "practice": "把一个身份标签改写成正在变化的经验。", "source": "终点系统更新到80"}, {"id": 395, "category": "自我", "line": "AI没有夺走我们的自由，是我们自己习惯的把选择权交出来了。", "practice": "允许今天的自己只完成够用的版本。", "source": "莫子综合流动"}, {"id": 396, "category": "自我", "line": "当一个人为捍卫自我价值而行动时，他会把你的目标当作自己的使命。", "practice": "列出一种不靠成就也存在的价值。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 397, "category": "自我", "line": "利他虽是美好品质，但若选择奉献他人，你将永远找不到自己的幸福。", "practice": "注意你对自己说话的语气，换得温和一点。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 398, "category": "自我", "line": "选择你的愿望，在一定程度上，只要你相信自己拥有它，你就会得到它。", "practice": "为一个真实偏好做一次选择。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 399, "category": "自我", "line": "你可以选择想愉快童年的经验，你可以自己选择，并且想出愉快的童年经验。", "practice": "停止一次用别人的速度羞辱自己。", "source": "双生紫焰YT文字大合集"}, {"id": 400, "category": "自我", "line": "当你意识到台下没有观众，或者说台下的观众全是你自己的分身，你就自由了。", "practice": "感谢旧模式曾保护你，再少使用它一次。", "source": "终点系统更新到80"}, {"id": 401, "category": "自我", "line": "镜中所见，你永远无法确知是福是祸，但永远可以选择对自己最有利的诠释。", "practice": "允许“不知道”存在，而不急着扮演确定。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 402, "category": "自我", "line": "请你停下来观察那个破碎，观察那个正在焦虑的自己，观察那个正在恐惧的自己。", "practice": "把失败写成反馈，不写成身份判决。", "source": "终点系统更新到80"}, {"id": 403, "category": "自我", "line": "你或许信心满满地确信自己将获得应得之物，热情地说服这一切都取决于个人选择。", "practice": "今天不以产出量给自己打分。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 404, "category": "自我", "line": "它让你看到自己的限制、自己的惯性、自己的恐惧，也让你看到自己的开放、觉察跟信任。", "practice": "辨认一个你已经不想继续扮演的角色。", "source": "双生紫焰YT文字大合集"}, {"id": 405, "category": "自我", "line": "如果我敢假设是这样的话——我可以让你熟悉这条法律，然后让你自己选择并承担后果。", "practice": "给一个被你否定的部分一句理解。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 406, "category": "自我", "line": "如果一切都渗透到你身上，那么你必须选择你想要的，调整自己，让自己感觉到你已经在那里了。", "practice": "做决定前问：这是我的声音，还是害怕被否定？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 407, "category": "自我", "line": "当你为某物奋斗时，如同试图将自己的显化推入可能性空间。", "practice": "允许自己改变曾经公开表达过的看法。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 408, "category": "自我", "line": "而当你选择时，空间自会向你靠拢。", "practice": "记下一件只有你知道自己已尽力的事。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 409, "category": "自我", "line": "你会发现自己正在穿越一些你没有意识到的事件之桥，它将你带到你的自由——不管那个目的是什么。", "practice": "把“应该成为谁”换成“此刻愿意怎样活”。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 410, "category": "自我", "line": "真正的觉醒，不会让你不需要选择。", "practice": "对一个小错误停止追加惩罚。", "source": "双生紫焰YT文字大合集"}, {"id": 411, "category": "自我", "line": "真正的觉醒，是你看见自己如何选择、谁在选、为什么选、在逃避什么。", "practice": "承认一种能力，也承认它不必时时被使用。", "source": "双生紫焰YT文字大合集"}, {"id": 412, "category": "自我", "line": "那这个不是取决于我，我能给你的知识、能给你的引导，我会一直给你，但是你怎么选择，那就是你自己的决定。", "practice": "今天为真实的自己腾出十分钟。", "source": "莫子yt频道文字"}, {"id": 413, "category": "自我", "line": "这种隐形的伤害往往深藏不露，因为人们总羞于公开捍卫自我价值——尽管我们无时无刻不在寻求价值认同。", "practice": "做一件不需要向任何人证明的小事。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 414, "category": "自我", "line": "基础信念就像你相信地心引力是一样的，你不需要每天提醒自己，我有地心引力我不会飞上天，你就是这样活着的。", "practice": "把一个身份标签改写成正在变化的经验。", "source": "终点系统更新到80"}, {"id": 415, "category": "自我", "line": "人们通过将自己与周遭世界相比较，来确立自我价值感。", "practice": "允许今天的自己只完成够用的版本。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 416, "category": "自我", "line": "他们从不怀疑自我价值，仿佛天生确信自己理应存在于世。", "practice": "列出一种不靠成就也存在的价值。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 417, "category": "自我", "line": "当你全然接纳自我，辩解的需求自会消弭，对惩罚的恐惧也将褪去。", "practice": "注意你对自己说话的语气，换得温和一点。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 418, "category": "自我", "line": "在那一刻，你不再假装自己是主人，你反而开始有点体验到一点点自由。", "practice": "为一个真实偏好做一次选择。", "source": "双生紫焰YT文字大合集"}, {"id": 419, "category": "自我", "line": "当你误以为自己是戏里面那个角色的时候，你就活在了恐惧跟抓取里面。", "practice": "停止一次用别人的速度羞辱自己。", "source": "终点系统更新到80"}, {"id": 420, "category": "自我", "line": "你跑去看医生，给你自己一个新的自我观念，来代替你旧有的那个。", "practice": "感谢旧模式曾保护你，再少使用它一次。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 421, "category": "自我", "line": "今晚你能带着你自己就是你想要成为的人的坚定信念离开这个礼堂吗。", "practice": "允许“不知道”存在，而不急着扮演确定。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 422, "category": "自我", "line": "你怎能向人认罪呢。", "practice": "把失败写成反馈，不写成身份判决。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 423, "category": "自我", "line": "我没有意识到他的承诺真的包含了他的自我——他实际上给了我自己。", "practice": "今天不以产出量给自己打分。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 424, "category": "自我", "line": "痛苦的本身其实没有能力延续它自己，它靠的是你的认同跟执着来灌溉它。", "practice": "辨认一个你已经不想继续扮演的角色。", "source": "双生紫焰YT文字大合集"}, {"id": 425, "category": "自我", "line": "你想要的未来，不需要去等待命运改写，而是你自己要大幅度的改变信念。", "practice": "给一个被你否定的部分一句理解。", "source": "终点系统更新到80"}, {"id": 426, "category": "自我", "line": "我侄子的朋友搬到了亚利桑那州，没有意识到他们带着自己的信仰和恐惧。", "practice": "做决定前问：这是我的声音，还是害怕被否定？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 427, "category": "自我", "line": "遵循这一模式，你将从你自己的自我中获得对现实永恒美的更深刻洞察。", "practice": "允许自己改变曾经公开表达过的看法。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 428, "category": "自我", "line": "他背叛了你，把你暴露给自己，把许多人的责任和权威钉在自己的肩膀上。", "practice": "记下一件只有你知道自己已尽力的事。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 429, "category": "自我", "line": "你将永远不会失去给予你自己的能力，你有足够的勇气去适应真实的自我。", "practice": "把“应该成为谁”换成“此刻愿意怎样活”。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 430, "category": "自我", "line": "当你把自己从真实的自我中解放出来后，你故意来这里扮演男人的角色。", "practice": "对一个小错误停止追加惩罚。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 431, "category": "自我", "line": "若能恪守中庸之道，不走向极端，你便能自由选择世间存在的一切美好。", "practice": "承认一种能力，也承认它不必时时被使用。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 432, "category": "自我", "line": "心量，就是你用信念把你自己限制住的这个状况，到底是开阔的还是封闭的。", "practice": "今天为真实的自己腾出十分钟。", "source": "终点系统更新到80"}, {"id": 433, "category": "自我", "line": "他之所以呈现这样的一个情况，它一定是在你自己内在有一个信念需要被解决。", "practice": "做一件不需要向任何人证明的小事。", "source": "莫子yt频道文字"}, {"id": 434, "category": "自我", "line": "在第五个阶段的时候，我们很注意自己起心动念想什麽，想要去改变自己的信念。", "practice": "把一个身份标签改写成正在变化的经验。", "source": "双生紫焰YT文字大合集"}, {"id": 435, "category": "自我", "line": "好，我们再来看个人的信念脚本，除了一些公用的规则，你还有自己私有的脚本。", "practice": "允许今天的自己只完成够用的版本。", "source": "终点系统更新到80"}, {"id": 436, "category": "自我", "line": "只有在信念升起前，觉察已经等在那里了，才有机会比信念快一步地做出选择。", "practice": "列出一种不靠成就也存在的价值。", "source": "登出键 简体版"}, {"id": 437, "category": "显化", "line": "当你处于一个类似睡眠的状态时，控制你的注意力，并且不要让它，从它的目标意图上游离。", "practice": "想象愿望实现后的一个平常瞬间，然后回到今天。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 438, "category": "显化", "line": "你有能力去适应一种状态，而不知道实现这一目标的手段，你假设自己的愿望得到了满足，而不具备人们声称你必须具备的任何才能。", "practice": "为愿望完成一个小动作，之后不再反复检查。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 439, "category": "显化", "line": "在这种冥想的情绪中，他在想象中体验到了如果他实现了自己的目标，他将在现实中体验到的东西，即他可能最终转化为他想象状态的形象。", "practice": "把“必须发生”改成“我选择这个方向”。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 440, "category": "显化", "line": "我可以去想象某个愿望已经实现的满足感和成就感，并看着它在我的外部世界里显现成现实。", "practice": "找到一个与旧故事不同的微小证据。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 441, "category": "显化", "line": "通过想象，你给你的愿望目标赋予了客观现实的真实性。", "practice": "今天用新身份做一个自然的决定。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 442, "category": "显化", "line": "知道你想要什么，假设你的愿望已经实现了，想象一圈朋友在祝贺你。", "practice": "停止一次“为什么还没有”的盘点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 443, "category": "显化", "line": "你凭借意图之力想象它开始移动，注意力扫描着可能性空间中铅笔处于各种其他位置的区域。", "practice": "让目标保持清楚，让实现路径保留开放。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 444, "category": "显化", "line": "当你想象的时候，你通过将你自己与你渴望梦想的状态认同为客观现实来声称已经存在的东西。", "practice": "选一句身体真正能接受的新假设。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 445, "category": "显化", "line": "如果你的注意力分散了，把它带回到爬那段楼梯的任务上，并继续这样做，直到想象的动作有了现实的坚实和清晰。", "practice": "问：愿望实现后的我会怎样对待此刻？", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 446, "category": "显化", "line": "人类只要把注意力集中在一个看不见的状态上，想象自己看到和感觉到它，就可以证明一个维度更大的世界的存在。", "practice": "把注意力从结果焦虑移回可做的一步。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 447, "category": "显化", "line": "那么，想象一下，在这个深度中，你正在看到和听到你想看到和听到的东西，直到你的注意力完全被想象的状态占据。", "practice": "允许一个尚未显现的过程保持中性。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 448, "category": "显化", "line": "假设你的愿望实现了，并学会强烈地意识到实现的状态，这样你就可以看到你的世界，并描述它相对于你实现的愿望。", "practice": "少向别人解释一次，把能量留给生活。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 449, "category": "显化", "line": "这就是我所说的想象创造现实的意思，因为假设就是信念。", "practice": "写下完成感，不写实现它的全部方法。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 450, "category": "显化", "line": "如果没有信仰，你就不可能取悦你自己美妙的人类想象力。", "practice": "今天不从暂时的波动推断最终结果。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 451, "category": "显化", "line": "一天一天，一周一周，一年一年，在没有人通过爱或较小的意图被允许干预的时候，我让自己掌握我的注意力和想象力。", "practice": "让期待变轻一点，行动变具体一点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 452, "category": "显化", "line": "也许你的注意力偏离了，那就把它拉回到爬楼梯上，并保持这个行为动作，直到在想象中的这个行为让你产生完全稳定的真实感和明显的现实感。", "practice": "在想象结束后，做一件符合新状态的小事。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 453, "category": "显化", "line": "我发现自己最好的状态是冥想，一种类似于睡眠的放松状态，但在这种状态下，我仍然有意识地控制着我的想象力，并且能够将注意力转移到精神上。", "practice": "放下一个过度重要的期限，保留真实意图。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 454, "category": "显化", "line": "当你第一次练习这项技术时，当它发生时，你会感到惊讶。", "practice": "把未来的安全感带回一次呼吸。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 455, "category": "显化", "line": "但是，当你学会如何完全接受假设的状态时，你就会知道你不必做任何事情来使它成为现实，因为假设包含它自己的实现计划。", "practice": "停止拿外界的即时反馈决定内在方向。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 456, "category": "显化", "line": "继续想象你的愿望已经成为现实。", "practice": "像种下种子那样完成今天，然后允许生长。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 457, "category": "显化", "line": "当它被客观地实现时，证据就是你的了。", "practice": "想象愿望实现后的一个平常瞬间，然后回到今天。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 458, "category": "显化", "line": "无需时刻保持心脑完美统一的状态，只需系统性地将注意力聚焦在目标画面上。", "practice": "为愿望完成一个小动作，之后不再反复检查。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 459, "category": "显化", "line": "这种看不见的状态会产生你想要的客观状态，因为所有客观现实都是由想象产生的。", "practice": "把“必须发生”改成“我选择这个方向”。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 460, "category": "显化", "line": "假设你的愿望实现的感觉是创造性地运用你的想象力将你渴望体验的东西带入你的世界。", "practice": "找到一个与旧故事不同的微小证据。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 461, "category": "显化", "line": "最大的秘密是有控制的想象力和持续的注意力，坚定地、反复地专注于要完成的目标。", "practice": "今天用新身份做一个自然的决定。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 462, "category": "显化", "line": "你可以通过创造性地运用你的想象力，通过假设你的愿望得到满足，从根本上改变剧本。", "practice": "停止一次“为什么还没有”的盘点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 463, "category": "显化", "line": "如果你不给予你的主观愿望和目标，一个客观现实的真实性，你就不会在它的实施过程中被祝福。", "practice": "让目标保持清楚，让实现路径保留开放。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 464, "category": "显化", "line": "保持被定义为你的目标的精神状态，直到它有了现实的感觉，天地的所有力量都会涌向它的化身。", "practice": "选一句身体真正能接受的新假设。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 465, "category": "显化", "line": "内在意图的运作方式简单直接，但现实往往不如人意——你仍需努力奋斗、坚持目标、克服障碍。", "practice": "问：愿望实现后的我会怎样对待此刻？", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 466, "category": "显化", "line": "如果你不动摇，不改变假设——如果你对假设保持忠诚，它就会变成事实，因为想象创造了现实。", "practice": "把注意力从结果焦虑移回可做的一步。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 467, "category": "显化", "line": "敢于假设所有事情都是可以想象的，通过假设你是你想成为的人，将这一现实置于极端的考验之下。", "practice": "允许一个尚未显现的过程保持中性。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 468, "category": "显化", "line": "没有人知道，但是你可以坐下来想象，没有人可以阻止你这么做，但是你能把现实赋予想象的状态吗。", "practice": "少向别人解释一次，把能量留给生活。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 469, "category": "显化", "line": "你不需要请求任何人的允许或帮助，而是进入你想象中的新状态，只是停留在那里直到你感受到现实。", "practice": "写下完成感，不写实现它的全部方法。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 470, "category": "显化", "line": "你只是敢于假设愿望实现了，直到它看起来很自然，直到它变成现实的音调，当它实现了，它就完成了。", "practice": "今天不从暂时的波动推断最终结果。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 471, "category": "显化", "line": "一定要先把一切看成如幻，软化了你的信念，你才有可能很容易的去显化、去改变，现实的状态、现实的存在等等。", "practice": "让期待变轻一点，行动变具体一点。", "source": "双生紫焰YT文字大合集"}, {"id": 472, "category": "显化", "line": "当人类假设自己的愿望得到满足时，他的第四维度自我就会找到实现这一目标的方法，找到实现这一目标的方法。", "practice": "在想象结束后，做一件符合新状态的小事。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 473, "category": "显化", "line": "然后不管是从这个状态里清醒，还是沉沉静的状态里，当你完全接受认同这愿望已经实现的时候，这个动作也就完成了。", "practice": "放下一个过度重要的期限，保留真实意图。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 474, "category": "显化", "line": "渴望是将全部注意力聚焦于目标本身。", "practice": "把未来的安全感带回一次呼吸。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 475, "category": "显化", "line": "内在意图是将注意力贯注于迈向目标的过程。", "practice": "停止拿外界的即时反馈决定内在方向。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 476, "category": "显化", "line": "外在意图则是静观目标如何自行实现。", "practice": "像种下种子那样完成今天，然后允许生长。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 477, "category": "显化", "line": "但如果你认为你的愿望现在已经实现了，并通过感觉的传递来坚持这个假设，它将在你的世界中作为一个文字事实被具体化。", "practice": "想象愿望实现后的一个平常瞬间，然后回到今天。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 478, "category": "显化", "line": "这样我们的格局就很容易在现实中跑出很多更大的一个格局的状态，让我们自己能够看到，我们要把它变成一个显化出来的结果。", "practice": "为愿望完成一个小动作，之后不再反复检查。", "source": "双生紫焰YT文字大合集"}, {"id": 479, "category": "显化", "line": "把你的主观愿望和客观目标拉到如此亲密，那么你就能感受到---如果它对于你是客观现实的话，它看上去会是什么样。", "practice": "把“必须发生”改成“我选择这个方向”。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 480, "category": "显化", "line": "如果注意力分散了，就把它带回到它的任务中去，限制那股气流，并继续这样做，直到想象中的行动具有现实的所有坚实性和鲜明性。", "practice": "找到一个与旧故事不同的微小证据。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 481, "category": "显化", "line": "然后在舒适的扶手椅上放松，诱导一种类似于睡眠的意识状态，并在想象中体验你们在现实中所体验到的，若你们已经是你们所渴望的。", "practice": "今天用新身份做一个自然的决定。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 482, "category": "显化", "line": "如果你只想进入你想象中的一个状态，并假设它的真实性，那么外部世界将回应你的假设，因为它是你的影子，永远见证着你内心的想象活动。", "practice": "停止一次“为什么还没有”的盘点。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 483, "category": "显化", "line": "在你决定了暗示你的愿望已经实现的行动之后，然后坐在舒适的椅子上或平躺在地上，闭上眼睛，原因很简单，这有助于诱发这种接近睡眠的状态。", "practice": "让目标保持清楚，让实现路径保留开放。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 484, "category": "显化", "line": "碰触到你能够去创造的现实，因为它不是短暂的，而是你活在总体意识的状态当中，活在总体意识的状态当中，你就可以随时随地去显化出你所要写话的现象。", "practice": "选一句身体真正能接受的新假设。", "source": "莫子综合流动"}, {"id": 485, "category": "显化", "line": "就是你如果把想象的世界跟真实世界的界限如果打破的话，你在现实世界显化的能力就会马上显化，而且就会产生不同的作用，就可以从想象的，在现实产生作用。", "practice": "问：愿望实现后的我会怎样对待此刻？", "source": "双生紫焰YT文字大合集"}, {"id": 486, "category": "显化", "line": "当能量匮乏时，你会悲观看待世界，这种状态将立即显化为现实。", "practice": "把注意力从结果焦虑移回可做的一步。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 487, "category": "显化", "line": "当生命力充沛时，你向世界之镜投射的是成功者的形象，于是成功自会向你走来，无需刻意追逐。", "practice": "允许一个尚未显现的过程保持中性。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 488, "category": "显化", "line": "我们只需专注于精神上想要看到的状态。", "practice": "少向别人解释一次，把能量留给生活。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 489, "category": "显化", "line": "但要使它成为现实，使它成为客观事实，我们必须把注意力集中在所期望的状态上，直到它具有所有感官的生动性和真实感。", "practice": "写下完成感，不写实现它的全部方法。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 490, "category": "显化", "line": "知道你想要什么，把你的注意力放在它清晰的形式上，然后观察你在想象什么。", "practice": "今天不从暂时的波动推断最终结果。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 491, "category": "显化", "line": "睡眠状态中，些许外在意图就足以飞翔。", "practice": "让期待变轻一点，行动变具体一点。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 492, "category": "显化", "line": "而在物质现实世界，意图必须绝对纯粹。", "practice": "在想象结束后，做一件符合新状态的小事。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 493, "category": "显化", "line": "我们必须坚持想象行为的感觉，使我们的心理对话符合我们已经实现目标时所说的话。", "practice": "放下一个过度重要的期限，保留真实意图。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 494, "category": "显化", "line": "借力他人内在意图达成目标，看似自私的表述背后，实则是避免阻碍他人实现真正愿望的智慧。", "practice": "把未来的安全感带回一次呼吸。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 495, "category": "显化", "line": "我哥哥相信一种看不见的状态的现实，想象着账本显示了一种健康的平衡，正如他所希望的那样。", "practice": "停止拿外界的即时反馈决定内在方向。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 496, "category": "显化", "line": "不过不必过分追求培养纯粹意图，实现个人目标只需普通意图——只是物质显化需要时间积累动能。", "practice": "像种下种子那样完成今天，然后允许生长。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 497, "category": "显化", "line": "当你意识到那些需要帮助的人时，即使你自己并不了解他们，你是否用你的想象力将他们从那种状态中解救出来。", "practice": "想象愿望实现后的一个平常瞬间，然后回到今天。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 498, "category": "显化", "line": "对目标的过度重视会使人执着于强行改变外界，这种用内在意图持续影响现实的思维惯性，源自将事物看得过重的心理定式。", "practice": "为愿望完成一个小动作，之后不再反复检查。", "source": "中文Reality-transurfing-_-steps-I-V-Vadim-Zeland_-Joanna-Dobson-St_-Petersburg_-Russia_-2016-CreateSpace(1)_1_100_translate"}, {"id": 499, "category": "显化", "line": "我知道，对于我们实现欲望的方式，没有比在现实中体验更清楚的定义了想象如果我们实现了，我们将亲身经历什么我们的目标。", "practice": "把“必须发生”改成“我选择这个方向”。", "source": "内维尔书籍 中文版 合并了300本 2"}, {"id": 500, "category": "显化", "line": "如果在孤独中，我们在想象中体验到如果我们实现了目标，我们将在现实中体验到的东西，那么我们最终将转变为我们理想的形象。", "practice": "找到一个与旧故事不同的微小证据。", "source": "内维尔书籍 中文版 合并了300本 2"}],C=["内观","金钱","健康","关系","自我","显化"],I={"内观":["insight.png","insight-2.png","insight-3.png","insight-4.png","insight-5.png","insight-6.png","insight-7.png"],"金钱":["money.png","money-2.png","money-3.png","money-4.png","money-5.png","money-6.png","money-7.png"],"健康":["health.png","health-2.png","health-3.png","health-4.png","health-5.png","health-6.png"],"关系":["relationship.png","relationship-2.png","relationship-3.png","relationship-4.png","relationship-5.png","relationship-6.png"],"自我":["self.png","self-2.png","self-3.png","self-4.png","self-5.png","self-6.png"],"显化":["manifest.png","manifest-2.png","manifest-3.png","manifest-4.png","manifest-5.png","manifest-6.png"]};let filter="全部",offset=0;const H=10800000,D=86400000,$=id=>document.getElementById(id);function pool(){return filter==="全部"?R:R.filter(x=>x.category===filter)}function pickIndex(length){const day=Math.floor(Date.now()/D),slot=Math.floor((Date.now()%D)/H),base=day*8+slot+offset;return filter==="全部"?((base*37+17)%length+length)%length:((base*37+3)%length+length)%length}function render(){const p=pool(),day=Math.floor(Date.now()/D),x=p[pickIndex(p.length)],images=I[x.category];$("cat").textContent=x.category;$("line").textContent=x.line;$("practice").textContent=x.practice;$("image").src="illustrations/"+images[(x.id+day)%images.length];$("image").alt=x.category+"主题的小黑手绘漫画";document.querySelectorAll("nav>button").forEach(b=>b.classList.toggle("active",b.dataset.c===filter))}function button(name){const b=document.createElement("button");b.textContent=name==="全部"?"流动":name;b.dataset.c=name;b.onclick=()=>{filter=name;offset=0;render()};return b}const nav=$("nav");nav.append(button("全部"),...C.map(button));const pager=document.createElement("div");pager.className="pager";pager.innerHTML='<button aria-label="上一条">←</button><span>500 条提醒</span><button aria-label="下一条">→</button>';pager.children[0].onclick=()=>{offset--;render()};pager.children[2].onclick=()=>{offset++;render()};nav.append(pager);function tick(){const n=Date.now(),left=(Math.floor(n/H)+1)*H-n,t=Math.floor(left/1000);$("count").textContent=[Math.floor(t/3600),Math.floor(t%3600/60),t%60].map(x=>String(x).padStart(2,"0")).join(":")}render();tick();setInterval(tick,1000);
$("copy").onclick=async()=>{const b=$("copy"),value=$("line").textContent;try{await navigator.clipboard.writeText(value)}catch{const area=document.createElement("textarea");area.value=value;area.style.position="fixed";area.style.opacity="0";document.body.append(area);area.select();document.execCommand("copy");area.remove()}b.dataset.label="已复制";setTimeout(()=>b.dataset.label="复制",1500)};
