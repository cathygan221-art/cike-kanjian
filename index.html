</main><script>
const R=[{"id": 1, "category": "内观", "line": "念头是屏幕上闪过的讯号，你是看见它的人。", "practice": "暂停三次呼吸：此刻是什么念头在自动写剧本？", "source": "终点系统更新到80"}, {"id": 2, "category": "内观", "line": "当你不知道自己相信什么，先看看此刻的情绪。", "practice": "不解释，只给当下的感受命名：紧、急、怕，还是空？", "source": "登出键 简体版"}, {"id": 3, "category": "内观", "line": "你一旦看见自己正在演角色，就已经退回了观众席。", "practice": "问自己：我现在是在观察，还是在表演“必须怎样”？", "source": "终点系统更新到80"}, {"id": 4, "category": "内观", "line": "注意力放在哪里，哪里就会变成你的世界。", "practice": "找出今天被你反复喂养的一个念头。", "source": "中文 Reality Transurfing I–V"}, {"id": 5, "category": "内观", "line": "意识的本质是觉察；你不必跟随每一个反应。", "practice": "在下一次立刻回应前，给自己五秒空白。", "source": "双生紫焰 YT 文字大合集"}, {"id": 6, "category": "内观", "line": "外在情境不是唯一的原因；先回到内在看自己如何理解它。", "practice": "对今天的一件事，分别写下“事实”与“我的解释”。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 7, "category": "金钱", "line": "追逐金钱之前，先看见你真正在追的是安全、自由，还是被认可。", "practice": "写下：“如果钱够了，我终于可以……”", "source": "终点系统更新到80"}, {"id": 8, "category": "金钱", "line": "想要富足，却反复确认自己缺乏，会让注意力一直待在缺乏里。", "practice": "此刻只找三个已经拥有的支持，不必夸大。", "source": "内维尔书籍 中文版合集"}, {"id": 9, "category": "金钱", "line": "钱是一面镜子：它会照出你对价值、配得和流动的信念。", "practice": "花钱或收钱时，观察身体是放松还是收紧。", "source": "莫子综合流动"}, {"id": 10, "category": "金钱", "line": "不要把“必须有用”当成自己值得获得收入的条件。", "practice": "留意今天是否在用忙碌证明自己有价值。", "source": "双生紫焰 YT 文字大合集"}, {"id": 11, "category": "金钱", "line": "尊重金钱，但别把它抬高到能决定你价值的位置。", "practice": "检查一笔消费：它来自选择，还是来自焦虑？", "source": "中文 Reality Transurfing I–V"}, {"id": 12, "category": "金钱", "line": "丰盛不是把所有东西抓紧，而是确信自己能与世界持续交换。", "practice": "今天做一次小而清醒的给予，也允许自己接收。", "source": "25莫子餐叙"}, {"id": 13, "category": "健康", "line": "身体不只是问题的所在，它也一直在告诉你内在正发生什么。", "practice": "不急着修理，先问一个部位：“你想让我注意什么？”", "source": "健康之道（赛斯书）"}, {"id": 14, "category": "健康", "line": "与其反复确认疾病，不如把方向转向“我正越来越健康地活着”。", "practice": "做一件身体会读为“我在照顾你”的小事。", "source": "双生紫焰 YT 文字大合集"}, {"id": 15, "category": "健康", "line": "呼吸不需要做对；它只需要被你重新感觉到。", "practice": "感觉一次吸气的凉和一次呼气的暖。", "source": "终点系统更新到80"}, {"id": 16, "category": "健康", "line": "你对身体持续讲述的故事，会参与身体如何感受自己。", "practice": "今天删掉一次“我的身体就是这样”的断言。", "source": "个人实相（上）"}, {"id": 17, "category": "健康", "line": "身体有自己的节奏；过度的监控有时会比不适更累。", "practice": "选一件身体正在自动做好的事，对它放心一分钟。", "source": "神奇之道—赛斯书"}, {"id": 18, "category": "健康", "line": "不要把每一个身体感受都立刻变成灾难的证据。", "practice": "区分当下的真实感觉，与你对它的预测。", "source": "个人实相（下）"}, {"id": 19, "category": "关系", "line": "爱不是把对方拉进你的剧本，而是允许两个人都有自由。", "practice": "找到你对某人的一个隐形期待，先把它说给自己听。", "source": "莫子 YT 频道文字"}, {"id": 20, "category": "关系", "line": "别人没有按你期待行动时，先观察你认为那意味着什么。", "practice": "把“他应该”改成“我希望”，看看身体有什么变化。", "source": "终点系统更新到80"}, {"id": 21, "category": "关系", "line": "做你自己，也允许他人做他自己；这是关系里的清醒。", "practice": "今天少替一个人决定一件事。", "source": "中文 Reality Transurfing I–V"}, {"id": 22, "category": "关系", "line": "当你无法停止责怪别人，就暂时看不见自己手中的选择。", "practice": "不否认受伤，只问：“这里有哪一小步是我能做的？”", "source": "内维尔的五堂课"}, {"id": 23, "category": "关系", "line": "恐惧常伪装成爱，它的语气是：“你不能离开我的安全范围。”", "practice": "观察一次关心：它是在给空间，还是在控制？", "source": "双生紫焰 YT 文字大合集"}, {"id": 24, "category": "关系", "line": "你看到的他人，也会穿过你自己的信念滤镜。", "practice": "对一个强烈评价问：“这句话是否也在说我？”", "source": "未知的实相·卷一"}, {"id": 25, "category": "自我", "line": "你不是那个必须把人生表演对的角色，你是能选择如何玩的人。", "practice": "取下一个今天正在戴着的标签：乖、强、成功或有用。", "source": "登出轉化班全集"}, {"id": 26, "category": "自我", "line": "想消灭自我，可能只是另一个更会批评的自我在动手。", "practice": "当你嫌弃自己时，问：“谁正在要求我必须更好？”", "source": "终点系统更新到80"}, {"id": 27, "category": "自我", "line": "你可以全力生活，却不必把自己的价值绑在输赢上。", "practice": "选一件重要的事，认真做，但不用结果定义你。", "source": "终点系统更新到80"}, {"id": 28, "category": "自我", "line": "你不用被塑造成谁；先清理那些不属于你的恐惧和模仿。", "practice": "识别今天的一个“应该”，看它最早是谁说的。", "source": "莫子九紫离火"}, {"id": 29, "category": "自我", "line": "你对改变的恐惧，常来自把外在世界看得比内在选择更强大。", "practice": "为那个一直拖延的变化，只做一个小到不会害怕的动作。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 30, "category": "自我", "line": "你所认同的“我是谁”，会持续挑选你能看见的可能。", "practice": "把“我就是……”改成“我过去常常……”。", "source": "未知的实相·卷二"}, {"id": 31, "category": "显化", "line": "别一直想着如何到达；先练习成为那个已经活在结果里的人。", "practice": "如果愿望已成为日常，你今天的语气会有什么不同？", "source": "莫子综合流动"}, {"id": 32, "category": "显化", "line": "愿望不需要在心里大喊；它需要一个稳定、可居住的内在状态。", "practice": "用一个十秒画面感受愿望完成后的平常。", "source": "内维尔的五堂课"}, {"id": 33, "category": "显化", "line": "真正的意图不是拼命推动现实，而是少一点内在拉扯。", "practice": "为一个目标删掉今天不必要的一次用力。", "source": "中文 Reality Transurfing I–V"}, {"id": 34, "category": "显化", "line": "你想象的不只是画面，而是你在那个画面里成为了谁。", "practice": "别只看结果：感觉那个你的身体姿态和呼吸。", "source": "内维尔书籍 中文版合集"}, {"id": 35, "category": "显化", "line": "越是把愿望变成对当下的否定，越难感觉到它已经开始。", "practice": "问：“现在有哪个 1% 已经在发生？”", "source": "莫子 YT 频道文字"}, {"id": 36, "category": "显化", "line": "给想象一个真实的感觉，然后回到生活；不必反复挖开种子检查。", "practice": "完成今天的想象后，做一件普通的当下小事。", "source": "内维尔书籍 中文版合集"}, {"id": 37, "category": "内观", "line": "情绪越强，越值得先看，不急着把它说成事实。", "practice": "把当下情绪放在身体里定位，不讲故事。", "source": "终点系统更新到80"}, {"id": 38, "category": "内观", "line": "你不需要消灭念头，只需要不再把每个念头都叫作“我”。", "practice": "对一个念头说：“我注意到这个念头。”", "source": "登出键 简体版"}, {"id": 39, "category": "内观", "line": "观察不是冷漠，是让体验有空间自己变化。", "practice": "今天遇到不适时，晚五秒再定义它。", "source": "未知的实相·卷一"}, {"id": 40, "category": "内观", "line": "当你开始证明自己没错，往往已经离开了当下。", "practice": "暂停辩解，先找出你正在保护什么。", "source": "双生紫焰 YT 文字大合集"}, {"id": 41, "category": "内观", "line": "一个感受可以很真，但它不必成为你对未来的预言。", "practice": "把“会一直这样”改成“现在正这样”。", "source": "个人实相（上）"}, {"id": 42, "category": "内观", "line": "你反复注意的东西，会比其他可能显得更像现实。", "practice": "今天主动寻找一个被忽略的好信号。", "source": "中文 Reality Transurfing I–V"}, {"id": 43, "category": "内观", "line": "焦虑在催你立刻得出结论，觉察允许你暂时不知道。", "practice": "今天给一个未知留出十分钟，不搜索答案。", "source": "莫子综合流动"}, {"id": 44, "category": "内观", "line": "你能看见一个模式，就说明你已经不完全被它包住。", "practice": "为今天的一个自动反应取个名字。", "source": "终点系统更新到80"}, {"id": 45, "category": "内观", "line": "先感觉脚底的地面，再处理脑子里的风暴。", "practice": "站稳，感觉双脚的压力与温度。", "source": "终点系统更新到80"}, {"id": 46, "category": "内观", "line": "沉默不是空白，它是让你听见内在噪声的背景。", "practice": "关掉一分钟声音，听见最近和最远的声音。", "source": "神奇之道—赛斯书"}, {"id": 47, "category": "内观", "line": "当下不需要完美，它只需要被你如实地经过。", "practice": "不改变任何事，完整感受十秒。", "source": "25莫子餐叙"}, {"id": 48, "category": "金钱", "line": "金钱焦虑常在问“够不够”，很少问“什么对我真的有价值”。", "practice": "在下一笔花费前，先说出它服务的价值。", "source": "莫子综合流动"}, {"id": 49, "category": "金钱", "line": "不要用别人的数字，衡量你自己的丰盛。", "practice": "写下你真正想要的三种生活感受。", "source": "双生紫焰 YT 文字大合集"}, {"id": 50, "category": "金钱", "line": "害怕失去时抓得越紧，反而越难看见新的流入。", "practice": "清理一个出于恐惧而不再需要的占有。", "source": "中文 Reality Transurfing I–V"}, {"id": 51, "category": "金钱", "line": "收下别人的善意，也是丰盛的一部分。", "practice": "今天被帮助时，只说谢谢，不急着偿还。", "source": "25莫子餐叙"}, {"id": 52, "category": "金钱", "line": "你值得的程度，不会随账户余额一起涨跌。", "practice": "看一眼余额，观察它触发了哪个自我评价。", "source": "内维尔书籍 中文版合集"}, {"id": 53, "category": "金钱", "line": "节省可以来自清醒，也可以来自对未来的恐惧。", "practice": "今天辨认一次：我是在选择，还是在缩小？", "source": "个人实相（下）"}, {"id": 54, "category": "金钱", "line": "真正的富足里，不需要用消费证明自己过得好。", "practice": "推迟一笔用来证明身份的冲动消费。", "source": "莫子综合流动"}, {"id": 55, "category": "金钱", "line": "如果你只允许辛苦的钱进来，轻松的机会就很难被看见。", "practice": "列出一种不靠加时也能创造价值的方式。", "source": "双生紫焰 YT 文字大合集"}, {"id": 56, "category": "金钱", "line": "钱的流出不一定是失去，也可能是价值正在换一种形式回来。", "practice": "为今天的一笔必要支出找到它带来的支持。", "source": "莫子综合流动"}, {"id": 57, "category": "金钱", "line": "不必等到完全不害怕，才开始做更成熟的金钱选择。", "practice": "今天完成一个十分钟内能做的财务整理。", "source": "内维尔的五堂课"}, {"id": 58, "category": "金钱", "line": "当你把金钱当成唯一的力量，就会忘了自己也在创造价值。", "practice": "写下你今天已经创造、却没有标价的价值。", "source": "莫子综合流动"}, {"id": 59, "category": "健康", "line": "身体的疲惫不是背叛，它可能是在替你拒绝无止境的要求。", "practice": "问自己：今天有什么可以不做？", "source": "健康之道（赛斯书）"}, {"id": 60, "category": "健康", "line": "照顾身体不是因为它坏了，而是因为它正在陪你生活。", "practice": "用感谢而非嫌弃的语气，对身体说一句话。", "source": "神奇之道—赛斯书"}, {"id": 61, "category": "健康", "line": "疼痛需要认真对待，但不必被想象成整个未来。", "practice": "有需要就求医；同时只描述此刻真实的感觉。", "source": "健康之道（赛斯书）"}, {"id": 62, "category": "健康", "line": "放松不是另一个必须完成的任务。", "practice": "不改变呼吸，只让下巴和肩膀少用一点力。", "source": "终点系统更新到80"}, {"id": 63, "category": "健康", "line": "对身体的信任，不是忽略症状，而是不把恐惧当成诊断。", "practice": "区分三件事：感觉、事实、担心。", "source": "个人实相（下）"}, {"id": 64, "category": "健康", "line": "身体会记得长期压抑的紧绷，也会学会新的安全感。", "practice": "找一个容易紧的部位，给它一分钟支撑。", "source": "莫子 YT 频道文字"}, {"id": 65, "category": "健康", "line": "健康不只是没有症状，也是你与身体相处时少一些战争。", "practice": "今天不批评镜子里的一个身体细节。", "source": "健康之道（赛斯书）"}, {"id": 66, "category": "健康", "line": "当心里一直说“我不能停”，身体可能会替你按下停止。", "practice": "在身体逼你停之前，主动休息十分钟。", "source": "双生紫焰 YT 文字大合集"}, {"id": 67, "category": "健康", "line": "每一次平稳的呼气，都在告诉神经系统：现在可以少防卫一点。", "practice": "让呼气比吸气长一点，重复五次。", "source": "终点系统更新到80"}, {"id": 68, "category": "健康", "line": "你不需要等身体完美，才允许自己喜欢它。", "practice": "找出身体今天支持你的三件小事。", "source": "个人实相（上）"}, {"id": 69, "category": "健康", "line": "真正的活力有自己的潮汐，不会每一天都以同样的强度出现。", "practice": "今天按真实能量安排一件事，不按理想能量。", "source": "神奇之道—赛斯书"}, {"id": 70, "category": "关系", "line": "关系里最累的常不是分歧，而是一直猜却不直接问。", "practice": "把一个猜测改成一个清楚、不控制的问题。", "source": "25莫子餐叙"}, {"id": 71, "category": "关系", "line": "边界不是惩罚别人，是告诉对方如何才能继续靠近你。", "practice": "用“我可以……我不可以……”说一个边界。", "source": "莫子综合流动"}, {"id": 72, "category": "关系", "line": "对方的沉默是他的沉默，不一定是你不值得被爱的证据。", "practice": "删掉一个你替对方写好的内心剧本。", "source": "双生紫焰 YT 文字大合集"}, {"id": 73, "category": "关系", "line": "你可以理解别人，同时不同意他的做法。", "practice": "练习说：“我能理解，但我不选择这样。”", "source": "中文 Reality Transurfing I–V"}, {"id": 74, "category": "关系", "line": "当你一直在教对方怎么爱你，先看看自己是否在忽略真实的他。", "practice": "区分：我爱的是这个人，还是他应该成为的样子？", "source": "双生紫焰 YT 文字大合集"}, {"id": 75, "category": "关系", "line": "拯救一个人，有时是为了不面对自己的无力感。", "practice": "帮忙前问：他请求了吗？这真的属于我吗？", "source": "登出轉化班全集"}, {"id": 76, "category": "关系", "line": "你对别人最强烈的指责，常带着你对自己的某种禁止。", "practice": "把一个“他怎么能”改成“我不允许自己”。", "source": "个人实相（上）"}, {"id": 77, "category": "关系", "line": "真话不一定要尖锐，温柔也不等于含糊。", "practice": "今天用一句短句说清真实需求。", "source": "25莫子餐叙"}, {"id": 78, "category": "关系", "line": "不再追逐对方的回应，不代表你不爱；也可能是你开始回到自己。", "practice": "把今天等回复的十分钟，还给自己。", "source": "莫子 YT 频道文字"}, {"id": 79, "category": "关系", "line": "道歉的重点不是让对方马上原谅，而是你愿意看见影响。", "practice": "道歉时先不加“但是”。", "source": "个人实相（下）"}, {"id": 80, "category": "关系", "line": "有些关系的成长，不是更靠近，而是终于能不拉扯地分开。", "practice": "允许一个人有他的路，你也回到你的路。", "source": "中文 Reality Transurfing I–V"}, {"id": 81, "category": "自我", "line": "你不必因为曾经选错，就继续对过去保持忠诚。", "practice": "允许自己今天更新一个旧决定。", "source": "未知的实相·卷二"}, {"id": 82, "category": "自我", "line": "对自己严厉不等于诚实，它有时只是熟悉的暴力。", "practice": "把一句自我责骂，改成一句具体的事实。", "source": "登出键 简体版"}, {"id": 83, "category": "自我", "line": "你可以没有把握，仍然做一个忠于自己的选择。", "practice": "找出一个不需要百分之百确定的下一步。", "source": "内维尔的五堂课"}, {"id": 84, "category": "自我", "line": "与别人比较时，你看见的是他的片段，却用来审判自己的全部。", "practice": "今天少看一次别人的进度，多看一次自己的方向。", "source": "莫子九紫离火"}, {"id": 85, "category": "自我", "line": "你不是等待被发现的固定答案，你也在每个选择中创造自己。", "practice": "今天用一个小动作投票给想成为的自己。", "source": "未知的实相·卷一"}, {"id": 86, "category": "自我", "line": "真正的自信不是确定不会失败，是知道失败也不会失去自己。", "practice": "为一件害怕做不好的事，允许一个不完美版本。", "source": "内维尔书籍 中文版合集"}, {"id": 87, "category": "自我", "line": "你累的时候不会比有精神时更没价值。", "practice": "今天不用产出量评估自己的一小时。", "source": "神奇之道—赛斯书"}, {"id": 88, "category": "自我", "line": "改变习惯不等于否定过去的你，是让过去的你不必继续辛苦。", "practice": "感谢一个旧模式曾保护你，再少做它一次。", "source": "登出轉化班全集"}, {"id": 89, "category": "自我", "line": "你可以尊重家人的恐惧，同时不把它继承成自己的命运。", "practice": "识别一个家庭里传来的“不可以”。", "source": "莫子 YT 频道文字"}, {"id": 90, "category": "自我", "line": "做自己不是固执地不变，是变化时仍能听见内在。", "practice": "今天做决定前，先问身体是展开还是收紧。", "source": "莫子九紫离火"}, {"id": 91, "category": "显化", "line": "愿望完成的感觉通常比你想象的更平静，而不是更用力。", "practice": "想象实现后的一个普通早晨。", "source": "内维尔书籍 中文版合集"}, {"id": 92, "category": "显化", "line": "不要一边种下新选择，一边每分钟检查它为什么还没发芽。", "practice": "为一个愿望做完今天的动作，然后离开它。", "source": "内维尔的五堂课"}, {"id": 93, "category": "显化", "line": "当目标变得过度重要，你会把每个波动都解读成失败。", "practice": "把一个目标从“必须”改成“我选择”。", "source": "中文 Reality Transurfing I–V"}, {"id": 94, "category": "显化", "line": "你不需要说服所有人你的新现实是可能的。", "practice": "今天少解释一次，把能量留给行动。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 95, "category": "显化", "line": "想象不是逃离当下，而是为当下选一个新的出发点。", "practice": "想象后立刻做一个与新状态相符的小动作。", "source": "内维尔书籍 中文版合集"}, {"id": 96, "category": "显化", "line": "先成为那个不再为愿望缺席而惩罚自己的人。", "practice": "今天停止一次“还没有”的盘点。", "source": "莫子综合流动"}, {"id": 97, "category": "显化", "line": "现实的延迟不一定是拒绝，它可能只是过程还在组织。", "practice": "为一件尚未显现的事，保留一点中性空间。", "source": "中文 Reality Transurfing I–V"}, {"id": 98, "category": "显化", "line": "一个稳定的小假设，比一百次焦急的肯定更容易被你活出来。", "practice": "选一句你真的说得进身体的新句子。", "source": "内维尔的五堂课"}, {"id": 99, "category": "显化", "line": "你不是在等待一个未来的自己来救现在的你。", "practice": "问：未来的我今天会怎样照顾当下的我？", "source": "莫子 YT 频道文字"}, {"id": 100, "category": "显化", "line": "改变现实的起点，常是不再反复确认旧现实是唯一版本。", "practice": "今天找出一个与旧故事不同的小证据。", "source": "未知的实相·卷二"}],C=["内观","金钱","健康","关系","自我","显化"],I={"内观":["insight.png","insight-2.png"],"金钱":["money.png","money-2.png"],"健康":["health.png","health-2.png"],"关系":["relationship.png","relationship-2.png"],"自我":["self.png","self-2.png"],"显化":["manifest.png","manifest-2.png"]};let filter="全部",offset=0;const H=10800000,D=86400000,$=id=>document.getElementById(id);function pool(){return filter==="全部"?R:R.filter(x=>x.category===filter)}function pickIndex(length){const day=Math.floor(Date.now()/D),slot=Math.floor((Date.now()%D)/H),base=day*8+slot+offset;return filter==="全部"?((base*37+17)%length+length)%length:((base*5+3)%length+length)%length}function render(){const p=pool(),day=Math.floor(Date.now()/D),x=p[pickIndex(p.length)],images=I[x.category];$("cat").textContent=x.category;$("line").textContent=x.line;$("practice").textContent=x.practice;$("image").src="illustrations/"+images[(x.id+day)%images.length];$("image").alt=x.category+"主题的小黑手绘漫画";document.querySelectorAll("nav>button").forEach(b=>b.classList.toggle("active",b.dataset.c===filter))}function button(name){const b=document.createElement("button");b.textContent=name==="全部"?"流动":name;b.dataset.c=name;b.onclick=()=>{filter=name;offset=0;render()};return b}const nav=$("nav");nav.append(button("全部"),...C.map(button));const pager=document.createElement("div");pager.className="pager";pager.innerHTML='<button aria-label="上一条">←</button><span>100 条提醒</span><button aria-label="下一条">→</button>';pager.children[0].onclick=()=>{offset--;render()};pager.children[2].onclick=()=>{offset++;render()};nav.append(pager);function tick(){const n=Date.now(),left=(Math.floor(n/H)+1)*H-n,t=Math.floor(left/1000);$("count").textContent=[Math.floor(t/3600),Math.floor(t%3600/60),t%60].map(x=>String(x).padStart(2,"0")).join(":")}render();tick();setInterval(tick,1000);
Object.assign(I,{"内观":["insight.png","insight-2.png","insight-3.png"],"金钱":["money.png","money-2.png","money-3.png"],"健康":["health.png","health-2.png","health-3.png"],"关系":["relationship.png","relationship-2.png","relationship-3.png"],"自我":["self.png","self-2.png","self-3.png"],"显化":["manifest.png","manifest-2.png","manifest-3.png"]});render();
