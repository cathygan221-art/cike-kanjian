<style>
:root{--ink:#171717;--muted:#737373;--line:#dedede;--accent:#ee4d2d;--blue:#1f58a7}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:#fff;font-family:"Songti SC","STSong","Noto Serif SC",serif}button{font:inherit}main{width:min(1380px,calc(100% - 96px));margin:auto;min-height:100vh}.header{display:flex;justify-content:space-between;align-items:flex-start;padding:48px 0 36px}.brand{margin:0;font-size:38px;line-height:1;font-weight:700;letter-spacing:-.04em}.tag{margin:12px 0 0;color:var(--muted);font-size:17px}.count{display:flex;gap:12px;align-items:center;color:var(--muted);font:15px system-ui}.count b{color:var(--accent);font-weight:500;font-variant-numeric:tabular-nums}.hero{min-height:540px;display:grid;grid-template-columns:minmax(0,1.02fr) minmax(420px,.98fr);gap:clamp(44px,7vw,108px);align-items:center;padding:10px 0 42px;animation:in .4s ease}@keyframes in{from{opacity:0;transform:translateY(7px)}}.cat{display:inline-block;color:var(--accent);font-size:20px;padding-bottom:8px;border-bottom:3px solid var(--accent);margin-bottom:26px}h1{margin:0;font-size:clamp(42px,4.45vw,74px);line-height:1.3;letter-spacing:-.035em;text-wrap:balance}.source{margin:28px 0 0;padding-left:16px;border-left:3px solid #999;color:var(--muted);font-size:16px}.practice{display:flex;gap:16px;margin-top:40px}.dot{width:28px;height:28px;flex:none;border:2px solid var(--accent);border-radius:50%;position:relative}.dot:after{content:"";position:absolute;width:8px;height:8px;background:var(--accent);border-radius:50%;left:8px;top:8px}.practice h2{margin:0 0 8px;color:var(--accent);font-size:21px;font-weight:500}.practice p{margin:0;color:var(--muted);font-size:17px;line-height:1.7}.comic{margin:0;position:relative}.comic img{display:block;width:100%;max-height:470px;object-fit:contain;mix-blend-mode:multiply}.comic figcaption{position:absolute;right:4%;bottom:7%;color:var(--blue);font-family:"Kaiti SC","STKaiti",serif;transform:rotate(-3deg)}nav{display:flex;align-items:center;gap:clamp(18px,3.8vw,58px);min-height:76px;border-bottom:1px solid var(--line);overflow-x:auto}nav>button{align-self:stretch;background:none;border:0;border-bottom:3px solid transparent;padding:0 6px;cursor:pointer;font-size:19px;white-space:nowrap}nav>button.active{color:var(--accent);border-bottom-color:var(--accent)}.pager{margin-left:auto;display:flex;align-items:center;gap:10px;font:12px system-ui;color:#777}.pager button{width:52px;height:46px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:24px}.library{border-bottom:1px solid var(--line)}.library summary{padding:28px 0;cursor:pointer;font-size:20px}.library ol{columns:3;color:#555;font-size:14px;line-height:2;padding:0 0 32px}.library li{break-inside:avoid}footer{padding:22px 0 42px;color:#999;font:12px system-ui}

</main><script>
const R=[{"id": 1, "category": "内观", "line": "念头是屏幕上闪过的讯号，你是看见它的人。", "practice": "暂停三次呼吸：此刻是什么念头在自动写剧本？", "source": "终点系统更新到80"}, {"id": 2, "category": "内观", "line": "当你不知道自己相信什么，先看看此刻的情绪。", "practice": "不解释，只给当下的感受命名：紧、急、怕，还是空？", "source": "登出键 简体版"}, {"id": 3, "category": "内观", "line": "你一旦看见自己正在演角色，就已经退回了观众席。", "practice": "问自己：我现在是在观察，还是在表演“必须怎样”？", "source": "终点系统更新到80"}, {"id": 4, "category": "内观", "line": "注意力放在哪里，哪里就会变成你的世界。", "practice": "找出今天被你反复喂养的一个念头。", "source": "中文 Reality Transurfing I–V"}, {"id": 5, "category": "内观", "line": "意识的本质是觉察；你不必跟随每一个反应。", "practice": "在下一次立刻回应前，给自己五秒空白。", "source": "双生紫焰 YT 文字大合集"}, {"id": 6, "category": "内观", "line": "外在情境不是唯一的原因；先回到内在看自己如何理解它。", "practice": "对今天的一件事，分别写下“事实”与“我的解释”。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 7, "category": "金钱", "line": "追逐金钱之前，先看见你真正在追的是安全、自由，还是被认可。", "practice": "写下：“如果钱够了，我终于可以……”", "source": "终点系统更新到80"}, {"id": 8, "category": "金钱", "line": "想要富足，却反复确认自己缺乏，会让注意力一直待在缺乏里。", "practice": "此刻只找三个已经拥有的支持，不必夸大。", "source": "内维尔书籍 中文版合集"}, {"id": 9, "category": "金钱", "line": "钱是一面镜子：它会照出你对价值、配得和流动的信念。", "practice": "花钱或收钱时，观察身体是放松还是收紧。", "source": "莫子综合流动"}, {"id": 10, "category": "金钱", "line": "不要把“必须有用”当成自己值得获得收入的条件。", "practice": "留意今天是否在用忙碌证明自己有价值。", "source": "双生紫焰 YT 文字大合集"}, {"id": 11, "category": "金钱", "line": "尊重金钱，但别把它抬高到能决定你价值的位置。", "practice": "检查一笔消费：它来自选择，还是来自焦虑？", "source": "中文 Reality Transurfing I–V"}, {"id": 12, "category": "金钱", "line": "丰盛不是把所有东西抓紧，而是确信自己能与世界持续交换。", "practice": "今天做一次小而清醒的给予，也允许自己接收。", "source": "25莫子餐叙"}, {"id": 13, "category": "健康", "line": "身体不只是问题的所在，它也一直在告诉你内在正发生什么。", "practice": "不急着修理，先问一个部位：“你想让我注意什么？”", "source": "健康之道（赛斯书）"}, {"id": 14, "category": "健康", "line": "与其反复确认疾病，不如把方向转向“我正越来越健康地活着”。", "practice": "做一件身体会读为“我在照顾你”的小事。", "source": "双生紫焰 YT 文字大合集"}, {"id": 15, "category": "健康", "line": "呼吸不需要做对；它只需要被你重新感觉到。", "practice": "感觉一次吸气的凉和一次呼气的暖。", "source": "终点系统更新到80"}, {"id": 16, "category": "健康", "line": "你对身体持续讲述的故事，会参与身体如何感受自己。", "practice": "今天删掉一次“我的身体就是这样”的断言。", "source": "个人实相（上）"}, {"id": 17, "category": "健康", "line": "身体有自己的节奏；过度的监控有时会比不适更累。", "practice": "选一件身体正在自动做好的事，对它放心一分钟。", "source": "神奇之道—赛斯书"}, {"id": 18, "category": "健康", "line": "不要把每一个身体感受都立刻变成灾难的证据。", "practice": "区分当下的真实感觉，与你对它的预测。", "source": "个人实相（下）"}, {"id": 19, "category": "关系", "line": "爱不是把对方拉进你的剧本，而是允许两个人都有自由。", "practice": "找到你对某人的一个隐形期待，先把它说给自己听。", "source": "莫子 YT 频道文字"}, {"id": 20, "category": "关系", "line": "别人没有按你期待行动时，先观察你认为那意味着什么。", "practice": "把“他应该”改成“我希望”，看看身体有什么变化。", "source": "终点系统更新到80"}, {"id": 21, "category": "关系", "line": "做你自己，也允许他人做他自己；这是关系里的清醒。", "practice": "今天少替一个人决定一件事。", "source": "中文 Reality Transurfing I–V"}, {"id": 22, "category": "关系", "line": "当你无法停止责怪别人，就暂时看不见自己手中的选择。", "practice": "不否认受伤，只问：“这里有哪一小步是我能做的？”", "source": "内维尔的五堂课"}, {"id": 23, "category": "关系", "line": "恐惧常伪装成爱，它的语气是：“你不能离开我的安全范围。”", "practice": "观察一次关心：它是在给空间，还是在控制？", "source": "双生紫焰 YT 文字大合集"}, {"id": 24, "category": "关系", "line": "你看到的他人，也会穿过你自己的信念滤镜。", "practice": "对一个强烈评价问：“这句话是否也在说我？”", "source": "未知的实相·卷一"}, {"id": 25, "category": "自我", "line": "你不是那个必须把人生表演对的角色，你是能选择如何玩的人。", "practice": "取下一个今天正在戴着的标签：乖、强、成功或有用。", "source": "登出轉化班全集"}, {"id": 26, "category": "自我", "line": "想消灭自我，可能只是另一个更会批评的自我在动手。", "practice": "当你嫌弃自己时，问：“谁正在要求我必须更好？”", "source": "终点系统更新到80"}, {"id": 27, "category": "自我", "line": "你可以全力生活，却不必把自己的价值绑在输赢上。", "practice": "选一件重要的事，认真做，但不用结果定义你。", "source": "终点系统更新到80"}, {"id": 28, "category": "自我", "line": "你不用被塑造成谁；先清理那些不属于你的恐惧和模仿。", "practice": "识别今天的一个“应该”，看它最早是谁说的。", "source": "莫子九紫离火"}, {"id": 29, "category": "自我", "line": "你对改变的恐惧，常来自把外在世界看得比内在选择更强大。", "practice": "为那个一直拖延的变化，只做一个小到不会害怕的动作。", "source": "2.内维尔戈达资料中文翻译"}, {"id": 30, "category": "自我", "line": "你所认同的“我是谁”，会持续挑选你能看见的可能。", "practice": "把“我就是……”改成“我过去常常……”。", "source": "未知的实相·卷二"}, {"id": 31, "category": "显化", "line": "别一直想着如何到达；先练习成为那个已经活在结果里的人。", "practice": "如果愿望已成为日常，你今天的语气会有什么不同？", "source": "莫子综合流动"}, {"id": 32, "category": "显化", "line": "愿望不需要在心里大喊；它需要一个稳定、可居住的内在状态。", "practice": "用一个十秒画面感受愿望完成后的平常。", "source": "内维尔的五堂课"}, {"id": 33, "category": "显化", "line": "真正的意图不是拼命推动现实，而是少一点内在拉扯。", "practice": "为一个目标删掉今天不必要的一次用力。", "source": "中文 Reality Transurfing I–V"}, {"id": 34, "category": "显化", "line": "你想象的不只是画面，而是你在那个画面里成为了谁。", "practice": "别只看结果：感觉那个你的身体姿态和呼吸。", "source": "内维尔书籍 中文版合集"}, {"id": 35, "category": "显化", "line": "越是把愿望变成对当下的否定，越难感觉到它已经开始。", "practice": "问：“现在有哪个 1% 已经在发生？”", "source": "莫子 YT 频道文字"}, {"id": 36, "category": "显化", "line": "给想象一个真实的感觉，然后回到生活；不必反复挖开种子检查。", "practice": "完成今天的想象后，做一件普通的当下小事。", "source": "内维尔书籍 中文版合集"}],C=["内观","金钱","健康","关系","自我","显化"],I={"内观":"insight.png","金钱":"money.png","健康":"health.png","关系":"relationship.png","自我":"self.png","显化":"manifest.png"};let filter="全部",offset=0;const H=10800000,$=id=>document.getElementById(id);function pool(){return filter==="全部"?R:R.filter(x=>x.category===filter)}function render(){const p=pool(),slot=Math.floor(Date.now()/H),x=p[((slot+offset)%p.length+p.length)%p.length];$("cat").textContent=x.category;$("line").textContent=x.line;$("source").textContent="提炼自《"+x.source+"》";$("practice").textContent=x.practice;$("image").src="illustrations/"+I[x.category];$("image").alt=x.category+"主题的小黑手绘漫画";document.querySelectorAll("nav>button").forEach(b=>b.classList.toggle("active",b.dataset.c===filter))}function button(name){const b=document.createElement("button");b.textContent=name==="全部"?"流动":name;b.dataset.c=name;b.onclick=()=>{filter=name;offset=0;render()};return b}const nav=$("nav");nav.append(button("全部"),...C.map(button));const pager=document.createElement("div");pager.className="pager";pager.innerHTML='<button aria-label="上一条">←</button><span>36 条提醒</span><button aria-label="下一条">→</button>';pager.children[0].onclick=()=>{offset--;render()};pager.children[2].onclick=()=>{offset++;render()};nav.append(pager);[...new Set(R.map(x=>x.source))].forEach(s=>{const li=document.createElement("li");li.textContent=s;$("sources").append(li)});function tick(){const n=Date.now(),left=(Math.floor(n/H)+1)*H-n,t=Math.floor(left/1000);$("count").textContent=[Math.floor(t/3600),Math.floor(t%3600/60),t%60].map(x=>String(x).padStart(2,"0")).join(":")}render();tick();setInterval(tick,1000);
</script></body></html>
